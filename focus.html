<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Room">
<meta name="theme-color" content="#0a0e0c">
<title>Body Double Focus Room</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e0c;--panel:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#d4e8d0;--dim:rgba(212,232,208,0.3);--mid:rgba(212,232,208,0.6);--green:#7ec880;--amber:#c8a840;--serif:'Crimson Pro',Georgia,serif;--mono:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--serif);min-height:100dvh;overflow:hidden;display:flex;flex-direction:column}
/* Animated background scene */
.scene{position:fixed;inset:0;z-index:0;transition:all 2s ease}
.scene-rain{background:linear-gradient(180deg,#0a0e14 0%,#0d1520 100%)}
.scene-fire{background:linear-gradient(180deg,#0f0a04 0%,#1a0e04 100%)}
.scene-cafe{background:linear-gradient(180deg,#0e0c0a 0%,#16120e 100%)}
.scene-forest{background:linear-gradient(180deg,#040e08 0%,#0a1a0c 100%)}
/* Particle canvas */
canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
.app{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:0 24px 30px}
/* Header */
.header{padding:52px 0 20px;text-align:center}
.header-title{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:4px}
.header-scene{font-size:28px;font-style:italic;color:var(--text);font-weight:300}
/* Timer ring */
.timer-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ring-container{position:relative;width:200px;height:200px}
.ring-svg{width:200px;height:200px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:3}
.ring-fill{fill:none;stroke-width:3;stroke-linecap:round;stroke-dasharray:565;transition:stroke-dashoffset 1s linear,stroke .5s}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-family:var(--mono);font-size:36px;font-weight:500;color:var(--text);letter-spacing:-1px}
.ring-status{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-top:4px}
/* Task label */
.task-label{font-style:italic;font-size:16px;color:var(--mid);text-align:center;font-weight:300;max-width:260px;line-height:1.5;min-height:26px}
/* Controls */
.controls{display:flex;flex-direction:column;gap:12px;padding-top:8px;width:100%}
.scene-row{display:flex;gap:8px;justify-content:center}
.scene-btn{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;flex:1;text-align:center;transition:all .2s}
.scene-btn.active{border-color:var(--green);color:var(--green);background:rgba(126,200,128,0.08)}
.dur-row{display:flex;gap:6px;justify-content:center}
.dur-btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:11px;color:var(--dim);cursor:pointer;flex:1;text-align:center;transition:all .15s}
.dur-btn.active{border-color:var(--amber);color:var(--amber)}
.task-input{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--serif);font-size:16px;font-style:italic;outline:none;text-align:center;width:100%}
.task-input::placeholder{color:var(--dim)}
.task-input:focus{border-color:rgba(126,200,128,.4)}
.main-btn{width:100%;background:rgba(126,200,128,0.12);border:1px solid rgba(126,200,128,.3);border-radius:14px;padding:16px;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--green);cursor:pointer;transition:all .2s}
.main-btn.stop{background:rgba(200,168,64,.08);border-color:rgba(200,168,64,.3);color:var(--amber)}
.main-btn:active{transform:scale(.98)}
</style>
</head>
<body>
<div class="scene scene-rain" id="scene"></div>
<canvas id="canvas"></canvas>
<div class="app">
  <div class="header">
    <div class="header-title">Body Double Focus Room</div>
    <div class="header-scene" id="sceneName">Rainy Night</div>
  </div>
  <div class="timer-section">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90"/>
        <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="90" stroke="#7ec880"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-time" id="ringTime">25:00</div>
        <div class="ring-status" id="ringStatus">Ready</div>
      </div>
    </div>
    <div class="task-label" id="taskDisplay">What are you working on?</div>
  </div>
  <div class="controls">
    <div class="scene-row">
      <div class="scene-btn active" onclick="setScene('rain',this)">🌧 Rain</div>
      <div class="scene-btn" onclick="setScene('fire',this)">🔥 Fire</div>
      <div class="scene-btn" onclick="setScene('cafe',this)">☕ Café</div>
      <div class="scene-btn" onclick="setScene('forest',this)">🌲 Forest</div>
    </div>
    <div class="dur-row">
      <div class="dur-btn" onclick="setDur(15,this)">15m</div>
      <div class="dur-btn active" onclick="setDur(25,this)">25m</div>
      <div class="dur-btn" onclick="setDur(45,this)">45m</div>
      <div class="dur-btn" onclick="setDur(60,this)">60m</div>
    </div>
    <input class="task-input" id="taskInput" placeholder="Name your task..." maxlength="50"/>
    <button class="main-btn" id="mainBtn" onclick="toggleTimer()">▶ Begin Focus Session</button>
  </div>
</div>
<script>
// Audio context for ambient sounds
let audioCtx=null,gainNode=null,running=false,timerSec=0,timerTotal=25*60,interval=null,currentScene='rain',dur=25;

const SCENES={
  rain:{name:'Rainy Night',class:'scene-rain',color:'#60a0ff',particles:'rain'},
  fire:{name:'Fireside',class:'scene-fire',color:'#ff8040',particles:'sparks'},
  cafe:{name:'Café Corner',class:'scene-cafe',color:'#c8a840',particles:'dust'},
  forest:{name:'Forest Quiet',class:'scene-forest',color:'#7ec880',particles:'leaves'},
};

// Particle system
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let particles=[];

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

function makeParticles(){
  particles=[];
  const n={rain:80,sparks:30,dust:20,leaves:15}[SCENES[currentScene].particles]||40;
  const type=SCENES[currentScene].particles;
  for(let i=0;i<n;i++){
    if(type==='rain')particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vy:8+Math.random()*6,vx:-1-Math.random(),len:10+Math.random()*15,alpha:0.1+Math.random()*0.3});
    else if(type==='sparks')particles.push({x:canvas.width*0.5+(-100+Math.random()*200),y:canvas.height*0.8,vx:(-1+Math.random()*2)*1.5,vy:-(1+Math.random()*3),life:1,decay:0.008+Math.random()*0.015,size:1+Math.random()*2});
    else if(type==='dust')particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(-0.3+Math.random()*0.6),vy:(-0.3+Math.random()*0.6),size:1+Math.random()*2,alpha:0.05+Math.random()*0.15});
    else particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:-0.5-Math.random()*1,vy:0.2+Math.random()*0.5,rotation:Math.random()*360,rotSpeed:(-1+Math.random()*2),size:4+Math.random()*6,alpha:0.1+Math.random()*0.25});
  }
}

function animParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const color=SCENES[currentScene].color;
  const type=SCENES[currentScene].particles;
  particles.forEach((p,i)=>{
    ctx.save();
    if(type==='rain'){
      ctx.strokeStyle=color.replace(')',','+p.alpha+')').replace('rgb','rgba').replace('#','rgba('+parseInt(color.slice(1,3),16)+','+parseInt(color.slice(3,5),16)+','+parseInt(color.slice(5,7),16)+',');
      ctx.strokeStyle=`rgba(${parseInt(color.slice(1,3),16)},${parseInt(color.slice(3,5),16)},${parseInt(color.slice(5,7),16)},${p.alpha})`;
      ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*2,p.y+p.len);ctx.stroke();
      p.x+=p.vx;p.y+=p.vy;
      if(p.y>canvas.height){p.y=-p.len;p.x=Math.random()*canvas.width;}
    } else if(type==='sparks'){
      if(p.life>0){
        const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
        ctx.fillStyle=`rgba(${r},${g},${b},${p.life*0.8})`;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;
      } else {p.x=canvas.width*0.5+(-100+Math.random()*200);p.y=canvas.height*0.8;p.vx=(-1+Math.random()*2)*1.5;p.vy=-(1+Math.random()*3);p.life=1;}
    } else if(type==='dust'){
      const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
      ctx.fillStyle=`rgba(${r},${g},${b},${p.alpha})`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    } else {
      const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
      ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);
      ctx.fillStyle=`rgba(${r},${g},${b},${p.alpha})`;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;
      if(p.x<-20)p.x=canvas.width+20;if(p.y>canvas.height+20)p.y=-20;
    }
    ctx.restore();
  });
  requestAnimationFrame(animParticles);
}

function setScene(key,el){
  currentScene=key;
  document.querySelectorAll('.scene-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sceneName').textContent=SCENES[key].name;
  document.getElementById('scene').className='scene '+SCENES[key].class;
  document.getElementById('ringFill').style.stroke=SCENES[key].color;
  makeParticles();
}

function setDur(m,el){dur=m;document.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');if(!running){timerTotal=m*60;updateRing(m*60,m*60);}}

function updateRing(sec,total){
  const m=Math.floor(sec/60),s=sec%60;
  document.getElementById('ringTime').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pct=sec/total;
  document.getElementById('ringFill').style.strokeDashoffset=565-(pct*565);
}

function toggleTimer(){
  if(!running){
    const task=document.getElementById('taskInput').value.trim();
    document.getElementById('taskDisplay').textContent=task||'Focusing...';
    timerTotal=dur*60;timerSec=timerTotal;running=true;
    document.getElementById('mainBtn').textContent='⏹ End Session';
    document.getElementById('mainBtn').className='main-btn stop';
    document.getElementById('ringStatus').textContent='Focusing';
    interval=setInterval(()=>{timerSec--;updateRing(timerSec,timerTotal);if(timerSec<=0){clearInterval(interval);complete();}},1000);
    updateRing(timerSec,timerTotal);
  } else {
    clearInterval(interval);running=false;
    document.getElementById('mainBtn').textContent='▶ Begin Focus Session';
    document.getElementById('mainBtn').className='main-btn';
    document.getElementById('ringStatus').textContent='Ready';
    document.getElementById('taskDisplay').textContent='What are you working on?';
    updateRing(dur*60,dur*60);
  }
}

function complete(){
  running=false;
  document.getElementById('ringStatus').textContent='Done!';
  document.getElementById('mainBtn').textContent='▶ Begin Focus Session';
  document.getElementById('mainBtn').className='main-btn';
}

makeParticles();animParticles();
updateRing(dur*60,dur*60);
</script>
</body>
</html>
