<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wishlist">
<meta name="theme-color" content="#0f0a18">
<title>Purchase Wishlist</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0a18;--panel:#171020;--panel2:#1e1528;--border:#2a1e38;--border2:#382848;--text:#e8d8ff;--dim:#4a3860;--mid:#8868b0;--purple:#b878ff;--purple-dim:rgba(184,120,255,0.1);--green:#60e890;--amber:#f0b840;--red:#f07060;--sans:'Raleway',sans-serif;--mono:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 0%,rgba(184,120,255,0.08) 0%,transparent 50%);pointer-events:none}
.app{position:relative;z-index:1}
.header{padding:52px 22px 16px;border-bottom:1px solid var(--border)}
.header-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--purple);opacity:.7;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:flex-start}
.header-title{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--text)}
.pts-badge{background:linear-gradient(135deg,rgba(184,120,255,.2),rgba(96,232,144,.1));border:1px solid rgba(184,120,255,.3);border-radius:12px;padding:8px 14px;text-align:right}
.pts-num{font-family:var(--mono);font-size:18px;color:var(--purple);line-height:1}
.pts-label{font-family:var(--mono);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
/* categories */
.cat-tabs{display:flex;padding:12px 22px;gap:7px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-chip{background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s}
.cat-chip.active{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}
/* List */
.wish-list{padding:14px 22px;display:flex;flex-direction:column;gap:8px;padding-bottom:100px}
.wish-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all .2s;position:relative}
.wish-card.purchased{opacity:.5}
.wish-card.purchased .wish-name{text-decoration:line-through;color:var(--dim)}
.wish-priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wish-body{flex:1;min-width:0}
.wish-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.2}
.wish-meta{font-size:11px;color:var(--mid);font-family:var(--mono)}
.wish-pts{font-family:var(--mono);font-size:11px;color:var(--green);font-weight:500;flex-shrink:0}
.wish-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:12px}
.wish-card.purchased .wish-check{background:var(--green);border-color:var(--green);color:#000}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--dim);font-style:italic;font-size:14px}
/* Panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none}
.overlay.show{display:block}
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding:20px 22px 36px;z-index:60;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.panel.open{transform:translateY(0)}
.panel-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px}
.fl{margin-bottom:12px}
.fl-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.fi{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;outline:none}
.fi:focus{border-color:var(--purple)}
.fi::placeholder{color:var(--dim)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prio-chips{display:flex;gap:7px}
.pc{background:var(--panel2);border:1px solid var(--border2);border-radius:20px;padding:7px 12px;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s}
.pc.active{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}
.submit{width:100%;background:var(--purple);border:none;border-radius:10px;padding:13px;font-family:var(--sans);font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:6px}
.submit:active{transform:scale(.98)}
.fab{position:fixed;bottom:28px;right:22px;width:56px;height:56px;background:var(--purple);border:none;border-radius:50%;font-size:26px;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(184,120,255,.35);z-index:40;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:active{transform:scale(.92)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--purple);color:#fff;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:9px 22px;border-radius:99px;opacity:0;transition:all .25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Progress bar */
.pts-bar-section{padding:12px 22px;border-bottom:1px solid var(--border)}
.pts-bar-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:flex;justify-content:space-between}
.pts-bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.pts-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--green));border-radius:99px;transition:width .5s ease}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-eyebrow">Quest Log Rewards</div>
  <div class="header-row">
    <div class="header-title">Purchase<br>Wishlist</div>
    <div class="pts-badge">
      <div class="pts-num" id="ptsNum">0</div>
      <div class="pts-label">Quest Pts</div>
    </div>
  </div>
</div>
<div class="pts-bar-section">
  <div class="pts-bar-label"><span>Progress to 100pt reward</span><span id="ptsBarLabel">0 / 100</span></div>
  <div class="pts-bar-track"><div class="pts-bar-fill" id="ptsBarFill" style="width:0%"></div></div>
</div>
<div class="cat-tabs">
  <div class="cat-chip active" onclick="setCat('all',this)">All</div>
  <div class="cat-chip" onclick="setCat('Gear',this)">Gear</div>
  <div class="cat-chip" onclick="setCat('Tools',this)">Tools</div>
  <div class="cat-chip" onclick="setCat('Comfort',this)">Comfort</div>
  <div class="cat-chip" onclick="setCat('Health',this)">Health</div>
  <div class="cat-chip" onclick="setCat('Fun',this)">Fun</div>
</div>
<div class="wish-list" id="wishList"></div>
</div>
<button class="fab" onclick="openAdd()">+</button>
<div class="overlay" id="overlay" onclick="closeAdd()"></div>
<div class="panel" id="panel">
  <div class="panel-title">Add to Wishlist</div>
  <div class="fl"><div class="fl-label">Item Name</div><input class="fi" id="wName" placeholder="What do you want?"/></div>
  <div class="two-col">
    <div class="fl"><div class="fl-label">Est. Price</div><input class="fi" id="wPrice" placeholder="$..." /></div>
    <div class="fl"><div class="fl-label">Category</div>
      <select class="fi" id="wCat" style="cursor:pointer">
        <option>Gear</option><option>Tools</option><option>Comfort</option><option>Health</option><option>Fun</option><option>Other</option>
      </select>
    </div>
  </div>
  <div class="fl"><div class="fl-label">Priority</div>
    <div class="prio-chips">
      <div class="pc active" onclick="selPrio(this,'Low')">Low</div>
      <div class="pc" onclick="selPrio(this,'Medium')">Medium</div>
      <div class="pc" onclick="selPrio(this,'High')">High</div>
      <div class="pc" onclick="selPrio(this,'Need')">Need</div>
    </div>
  </div>
  <div class="fl"><div class="fl-label">Link / Notes</div><input class="fi" id="wNotes" placeholder="URL, store, or notes..."/></div>
  <button class="submit" onclick="saveItem()">Add Item</button>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='wishlist_v1';
const QUEST_KEY='questlog_v1';
const PRIO_COLORS={Low:'var(--dim)',Medium:'var(--amber)',High:'var(--purple)',Need:'#f07060'};
let state={items:[],nextId:1};
let currentCat='all',selPrioVal='Low';

function load(){
  try{const d=localStorage.getItem(KEY);if(d)state=JSON.parse(d);}catch(_){}
  // Load quest points from Quest Log
  try{const q=localStorage.getItem(QUEST_KEY);if(q){const qd=JSON.parse(q);const pts=qd.totalPoints||0;document.getElementById('ptsNum').textContent=pts;const pct=Math.min(100,Math.round((pts%100)));document.getElementById('ptsBarFill').style.width=pct+'%';document.getElementById('ptsBarLabel').textContent=pts+' / '+Math.ceil(pts/100)*100;}}catch(_){}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(_){}}

function setCat(cat,el){currentCat=cat;document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}
function selPrio(el,p){selPrioVal=p;document.querySelectorAll('.pc').forEach(c=>c.classList.remove('active'));el.classList.add('active');}
function openAdd(){document.getElementById('panel').classList.add('open');document.getElementById('overlay').classList.add('show');document.getElementById('wName').focus();}
function closeAdd(){document.getElementById('panel').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

function saveItem(){
  const name=document.getElementById('wName').value.trim();if(!name)return;
  state.items.push({id:state.nextId++,name,price:document.getElementById('wPrice').value.trim(),cat:document.getElementById('wCat').value,priority:selPrioVal,notes:document.getElementById('wNotes').value.trim(),purchased:false,added:new Date().toISOString()});
  save();render();closeAdd();
  document.getElementById('wName').value='';document.getElementById('wPrice').value='';document.getElementById('wNotes').value='';
  showToast('Added ✓');
}

function togglePurchased(id){
  const item=state.items.find(x=>x.id===id);if(!item)return;
  item.purchased=!item.purchased;save();render();
  showToast(item.purchased?'Purchased! 🎉':'Unmarked');
}

function render(){
  let items=currentCat==='all'?state.items:state.items.filter(i=>i.cat===currentCat);
  // Sort: not purchased first, then by priority
  const prioOrder={Need:0,High:1,Medium:2,Low:3};
  items=[...items].sort((a,b)=>{if(a.purchased!==b.purchased)return a.purchased?1:-1;return(prioOrder[a.priority]||3)-(prioOrder[b.priority]||3);});
  const el=document.getElementById('wishList');
  if(!items.length){el.innerHTML='<div class="empty">Nothing here yet.<br>Tap + to add something you want.</div>';return;}
  el.innerHTML=items.map(item=>`
    <div class="wish-card ${item.purchased?'purchased':''}">
      <div class="wish-priority-dot" style="background:${PRIO_COLORS[item.priority]||'var(--dim)'}"></div>
      <div class="wish-body">
        <div class="wish-name">${item.name}</div>
        <div class="wish-meta">${item.cat}${item.price?' · '+item.price:''}${item.priority?' · '+item.priority:''}</div>
        ${item.notes&&!item.notes.startsWith('http')?`<div style="font-size:11px;color:var(--dim);margin-top:3px">${item.notes}</div>`:''}
      </div>
      <div class="wish-check" onclick="togglePurchased(${item.id})">${item.purchased?'✓':''}</div>
    </div>`).join('');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
document.getElementById('wName').addEventListener('keydown',e=>{if(e.key==='Enter')saveItem();});
load();render();
</script>
</body>
</html>
