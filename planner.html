<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Task Planner">
<meta name="theme-color" content="#111318">
<title>Task Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111318;
    --surface: #1a1d24;
    --surface2: #22262f;
    --border: #2a2f3a;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --text-mid: #9ca3af;
    --daily: #3b82f6;
    --daily-dim: #1d4ed844;
    --weekly: #8b5cf6;
    --weekly-dim: #6d28d944;
    --monthly: #f59e0b;
    --monthly-dim: #b4530044;
    --green: #10b981;
    --red: #ef4444;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 20px 20px;
    background: linear-gradient(180deg, #161a22 0%, var(--bg) 100%);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .header-date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .streak-badge {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #000;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── TIMER RING ── */
  .timer-section {
    padding: 0 20px 24px;
    display: flex;
    justify-content: center;
  }

  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ring-container {
    position: relative;
    width: 88px;
    height: 88px;
    flex-shrink: 0;
  }

  .ring-svg {
    width: 88px;
    height: 88px;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .ring-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
    stroke-dasharray: 245;
    stroke-dashoffset: 245;
  }

  .ring-time {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-time-value {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .ring-time-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .timer-controls {
    flex: 1;
  }

  .timer-task-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .timer-task-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .timer-btns {
    display: flex;
    gap: 8px;
  }

  .timer-btn {
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-btn.start {
    background: var(--green);
    color: #000;
    flex: 1;
  }

  .timer-btn.stop {
    background: var(--red);
    color: #fff;
    flex: 1;
  }

  .timer-btn.reset {
    background: var(--surface2);
    color: var(--text-dim);
    padding: 8px 12px;
  }

  .timer-btn:active { transform: scale(0.96); }

  .duration-select {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .dur-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .dur-chip.active {
    background: var(--daily-dim);
    border-color: var(--daily);
    color: var(--daily);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    margin: 0 20px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    border-radius: 9px;
    padding: 9px 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 2px;
  }

  /* ── TASK LIST ── */
  .task-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 100px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .task-item.daily::before { background: var(--daily); }
  .task-item.weekly::before { background: var(--weekly); }
  .task-item.monthly::before { background: var(--monthly); }

  .task-item.done {
    opacity: 0.5;
  }

  .task-item.done .task-name {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .task-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 12px;
  }

  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }

  .task-item.daily .task-check { border-color: var(--daily); }
  .task-item.weekly .task-check { border-color: var(--weekly); }
  .task-item.monthly .task-check { border-color: var(--monthly); }

  .task-body { flex: 1; min-width: 0; }

  .task-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .task-freq {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .daily .task-freq { color: var(--daily); background: var(--daily-dim); }
  .weekly .task-freq { color: var(--weekly); background: var(--weekly-dim); }
  .monthly .task-freq { color: var(--monthly); background: var(--monthly-dim); }

  .task-pts {
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    margin-left: auto;
    flex-shrink: 0;
  }

  .task-timer-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .task-timer-btn:active { transform: scale(0.95); }

  /* ── ADD TASK ── */
  .add-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 32px;
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }

  .add-panel.open { transform: translateY(0); }

  .add-panel-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .add-input:focus { border-color: var(--daily); }
  .add-input::placeholder { color: var(--text-dim); }

  .freq-chips {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .freq-chip {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--text-dim);
  }

  .freq-chip.daily.active { background: var(--daily-dim); border-color: var(--daily); color: var(--daily); }
  .freq-chip.weekly.active { background: var(--weekly-dim); border-color: var(--weekly); color: var(--weekly); }
  .freq-chip.monthly.active { background: var(--monthly-dim); border-color: var(--monthly); color: var(--monthly); }

  .add-submit {
    width: 100%;
    background: var(--daily);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-submit:active { transform: scale(0.98); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 56px;
    height: 56px;
    background: var(--daily);
    border: none;
    border-radius: 50%;
    font-size: 24px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    transition: all 0.2s;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fab:active { transform: scale(0.92); }

  /* Progress summary */
  .progress-bar-section {
    padding: 0 20px 20px;
  }

  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 16px;
  }

  .progress-item {
    flex: 1;
    text-align: center;
  }

  .progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .progress-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-mini-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-top: 6px;
    overflow: hidden;
  }

  .progress-mini-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 45;
    display: none;
  }

  .overlay.show { display: block; }

  /* Section label */
  .section-label {
    padding: 4px 20px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Empty tasks */
  .empty-tasks {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 14px;
  }

  /* Completion flash */
  @keyframes completionFlash {
    0% { transform: scale(1); }
    30% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .task-item.flash {
    animation: completionFlash 0.3s ease;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeAdd()"></div>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Task Planner</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>
</div>

<!-- Timer -->
<div class="timer-section">
  <div class="timer-card">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="39"/>
        <circle class="ring-fill" id="ringFill" cx="44" cy="44" r="39"/>
      </svg>
      <div class="ring-time">
        <div class="ring-time-value" id="ringTime">--:--</div>
        <div class="ring-time-label" id="ringLabel">Focus</div>
      </div>
    </div>
    <div class="timer-controls">
      <div class="timer-task-name" id="timerTaskName">Select a task</div>
      <div class="timer-task-sub" id="timerTaskSub">Tap ▶ on any task to start</div>
      <div class="duration-select">
        <div class="dur-chip active" onclick="setDuration(5, this)">5m</div>
        <div class="dur-chip" onclick="setDuration(10, this)">10m</div>
        <div class="dur-chip" onclick="setDuration(15, this)">15m</div>
        <div class="dur-chip" onclick="setDuration(25, this)">25m</div>
      </div>
      <div class="timer-btns">
        <button class="timer-btn start" id="startStopBtn" onclick="toggleTimer()">▶ Start</button>
        <button class="timer-btn reset" onclick="resetTimer()">↺</button>
      </div>
    </div>
  </div>
</div>

<!-- Progress -->
<div class="progress-bar-section" id="progressSection"></div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="setTab('all', this)">
    All
    <div class="tab-dot" style="background:#6b7280"></div>
  </button>
  <button class="tab" onclick="setTab('daily', this)">
    Daily
    <div class="tab-dot" style="background:var(--daily)"></div>
  </button>
  <button class="tab" onclick="setTab('weekly', this)">
    Weekly
    <div class="tab-dot" style="background:var(--weekly)"></div>
  </button>
  <button class="tab" onclick="setTab('monthly', this)">
    Monthly
    <div class="tab-dot" style="background:var(--monthly)"></div>
  </button>
</div>

<!-- Task List -->
<div class="task-list" id="taskList"></div>

<!-- FAB -->
<button class="fab" onclick="openAdd()">+</button>

<!-- Add Panel -->
<div class="add-panel" id="addPanel">
  <div class="add-panel-title">New Recurring Task</div>
  <div class="add-row">
    <input class="add-input" id="taskInput" placeholder="Task name..." maxlength="50" />
  </div>
  <div class="freq-chips">
    <div class="freq-chip daily active" onclick="selectFreq('daily', this)">📅 Daily</div>
    <div class="freq-chip weekly" onclick="selectFreq('weekly', this)">📆 Weekly</div>
    <div class="freq-chip monthly" onclick="selectFreq('monthly', this)">🗓 Monthly</div>
  </div>
  <div class="add-row">
    <input class="add-input" id="ptsInput" type="number" placeholder="Points (e.g. 5)" min="1" max="20" style="width:100px;flex:none"/>
    <button class="add-submit" onclick="addTask()">Add Task</button>
  </div>
</div>

<script>
const KEY = 'taskplanner_v1';
const TODAY = new Date().toDateString();
const WEEK = getWeekKey();
const MONTH = `${new Date().getFullYear()}-${new Date().getMonth()}`;

function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toDateString();
}

// Default tasks
const DEFAULT_TASKS = [
  { id: 1, name: 'Morning hygiene', freq: 'daily', pts: 7, emoji: '🚿' },
  { id: 2, name: 'Take medications', freq: 'daily', pts: 7, emoji: '💊' },
  { id: 3, name: 'Walk Micco', freq: 'daily', pts: 7, emoji: '🐕' },
  { id: 4, name: 'Tidy up', freq: 'daily', pts: 5, emoji: '🏠' },
  { id: 5, name: 'Clean pipes', freq: 'weekly', pts: 10, emoji: '🪄' },
  { id: 6, name: 'Laundry', freq: 'weekly', pts: 10, emoji: '👕' },
  { id: 7, name: 'Clean bathroom', freq: 'weekly', pts: 10, emoji: '🛁' },
  { id: 8, name: 'Clean Kimber/30-30', freq: 'monthly', pts: 15, emoji: '🔧' },
  { id: 9, name: 'Deep clean kitchen', freq: 'monthly', pts: 15, emoji: '🍳' },
  { id: 10, name: 'Review finances', freq: 'monthly', pts: 15, emoji: '💰' },
];

let state = {
  tasks: DEFAULT_TASKS,
  completions: {}, // { taskId: { daily: date, weekly: weekKey, monthly: monthKey } }
  streak: 0,
  lastStreakDate: null,
  nextId: 11,
};

let currentTab = 'all';
let newFreq = 'daily';
let timerInterval = null;
let timerSeconds = 0;
let timerTotal = 5 * 60;
let timerRunning = false;
let timerTaskName = '';
let selectedDuration = 5;

function load() {
  try {
    const d = localStorage.getItem(KEY);
    if (d) state = { ...state, ...JSON.parse(d) };
  } catch(_) {}
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(_) {}
}

function isComplete(task) {
  const c = state.completions[task.id];
  if (!c) return false;
  if (task.freq === 'daily') return c.daily === TODAY;
  if (task.freq === 'weekly') return c.weekly === WEEK;
  if (task.freq === 'monthly') return c.monthly === MONTH;
  return false;
}

function toggleTask(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!state.completions[taskId]) state.completions[taskId] = {};
  const c = state.completions[taskId];
  const done = isComplete(task);
  if (!done) {
    if (task.freq === 'daily') c.daily = TODAY;
    if (task.freq === 'weekly') c.weekly = WEEK;
    if (task.freq === 'monthly') c.monthly = MONTH;
    updateStreak();
  } else {
    if (task.freq === 'daily') delete c.daily;
    if (task.freq === 'weekly') delete c.weekly;
    if (task.freq === 'monthly') delete c.monthly;
  }
  save();
  render();
  if (!done) flashItem(taskId);
}

function flashItem(taskId) {
  const el = document.getElementById(`task-${taskId}`);
  if (el) {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
  }
}

function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastStreakDate === today) return;
  if (state.lastStreakDate === yesterday) state.streak++;
  else if (state.lastStreakDate !== today) state.streak = 1;
  state.lastStreakDate = today;
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function selectFreq(freq, el) {
  newFreq = freq;
  document.querySelectorAll('.freq-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function addTask() {
  const name = document.getElementById('taskInput').value.trim();
  const pts = parseInt(document.getElementById('ptsInput').value) || 5;
  if (!name) return;
  state.tasks.push({
    id: state.nextId++,
    name,
    freq: newFreq,
    pts,
    emoji: newFreq === 'daily' ? '📅' : newFreq === 'weekly' ? '📆' : '🗓',
  });
  save();
  render();
  closeAdd();
  document.getElementById('taskInput').value = '';
  document.getElementById('ptsInput').value = '';
}

function openAdd() {
  document.getElementById('addPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('taskInput').focus();
}

function closeAdd() {
  document.getElementById('addPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function startTimerFor(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  timerTaskName = task.emoji + ' ' + task.name;
  document.getElementById('timerTaskName').textContent = timerTaskName;
  document.getElementById('timerTaskSub').textContent = task.freq + ' task · ' + task.pts + ' pts';
  resetTimer();
}

function setDuration(mins, el) {
  selectedDuration = mins;
  document.querySelectorAll('.dur-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (!timerRunning) {
    timerTotal = mins * 60;
    timerSeconds = 0;
    updateRing();
  }
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('startStopBtn').textContent = '▶ Resume';
    document.getElementById('startStopBtn').className = 'timer-btn start';
  } else {
    if (timerSeconds === 0) {
      timerTotal = selectedDuration * 60;
      timerSeconds = timerTotal;
    }
    timerRunning = true;
    document.getElementById('startStopBtn').textContent = '⏸ Pause';
    document.getElementById('startStopBtn').className = 'timer-btn stop';
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateRing();
      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('startStopBtn').textContent = '▶ Start';
        document.getElementById('startStopBtn').className = 'timer-btn start';
        document.getElementById('ringLabel').textContent = 'Done!';
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  timerTotal = selectedDuration * 60;
  document.getElementById('startStopBtn').textContent = '▶ Start';
  document.getElementById('startStopBtn').className = 'timer-btn start';
  document.getElementById('ringTime').textContent = `${selectedDuration}:00`;
  document.getElementById('ringLabel').textContent = 'Focus';
  const fill = document.getElementById('ringFill');
  fill.style.strokeDashoffset = '245';
  fill.style.stroke = 'var(--daily)';
}

function updateRing() {
  const remaining = timerSeconds;
  const total = timerTotal;
  const pct = remaining / total;
  const circumference = 245;
  const offset = circumference - (pct * circumference);
  const fill = document.getElementById('ringFill');
  fill.style.strokeDashoffset = offset;

  // Color based on time left
  if (pct > 0.5) fill.style.stroke = 'var(--daily)';
  else if (pct > 0.25) fill.style.stroke = 'var(--monthly)';
  else fill.style.stroke = 'var(--red)';

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  document.getElementById('ringTime').textContent =
    `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('ringLabel').textContent = timerRunning ? 'Focus' : 'Paused';
}

function render() {
  // Header date
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  // Streak
  document.getElementById('streakBadge').textContent = `🔥 ${state.streak}`;

  // Progress
  const daily = state.tasks.filter(t => t.freq === 'daily');
  const weekly = state.tasks.filter(t => t.freq === 'weekly');
  const monthly = state.tasks.filter(t => t.freq === 'monthly');
  const dDone = daily.filter(t => isComplete(t)).length;
  const wDone = weekly.filter(t => isComplete(t)).length;
  const mDone = monthly.filter(t => isComplete(t)).length;

  document.getElementById('progressSection').innerHTML = `
    <div class="progress-card">
      <div class="progress-item">
        <div class="progress-count" style="color:var(--daily)">${dDone}/${daily.length}</div>
        <div class="progress-label">Daily</div>
        <div class="progress-mini-bar"><div class="progress-mini-fill" style="width:${daily.length ? (dDone/daily.length*100) : 0}%;background:var(--daily)"></div></div>
      </div>
      <div class="progress-item">
        <div class="progress-count" style="color:var(--weekly)">${wDone}/${weekly.length}</div>
        <div class="progress-label">Weekly</div>
        <div class="progress-mini-bar"><div class="progress-mini-fill" style="width:${weekly.length ? (wDone/weekly.length*100) : 0}%;background:var(--weekly)"></div></div>
      </div>
      <div class="progress-item">
        <div class="progress-count" style="color:var(--monthly)">${mDone}/${monthly.length}</div>
        <div class="progress-label">Monthly</div>
        <div class="progress-mini-bar"><div class="progress-mini-fill" style="width:${monthly.length ? (mDone/monthly.length*100) : 0}%;background:var(--monthly)"></div></div>
      </div>
    </div>`;

  // Tasks
  let tasks = state.tasks;
  if (currentTab !== 'all') tasks = tasks.filter(t => t.freq === currentTab);

  // Sort: incomplete first
  tasks = [...tasks].sort((a, b) => {
    const ad = isComplete(a) ? 1 : 0;
    const bd = isComplete(b) ? 1 : 0;
    return ad - bd;
  });

  const list = document.getElementById('taskList');
  if (!tasks.length) {
    list.innerHTML = `<div class="empty-tasks">No ${currentTab === 'all' ? '' : currentTab} tasks yet.<br>Tap + to add one.</div>`;
    return;
  }

  list.innerHTML = tasks.map(task => {
    const done = isComplete(task);
    return `
      <div class="task-item ${task.freq} ${done ? 'done' : ''}" id="task-${task.id}" onclick="toggleTask(${task.id})">
        <div class="task-check">${done ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-name">${task.emoji || ''} ${task.name}</div>
          <div class="task-meta">
            <span class="task-freq">${task.freq}</span>
            <span>${task.pts} pts</span>
          </div>
        </div>
        <button class="task-timer-btn" onclick="event.stopPropagation(); startTimerFor(${task.id})">▶</button>
      </div>`;
  }).join('');
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

load();
render();
resetTimer();
</script>
</body>
</html>
