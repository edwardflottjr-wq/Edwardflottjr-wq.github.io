<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Just Start">
<meta name="theme-color" content="#080c10">
<title>Task Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--panel:#0f1520;--border:#1a2535;--text:#f0f4ff;--dim:#2a3d55;--mid:#5a7898;--blue:#4488ff;--green:#20d980;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Archivo Black',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;overflow:hidden;display:flex;flex-direction:column}
/* Pulse bg */
@keyframes bgPulse{0%,100%{opacity:.4}50%{opacity:.8}}
.bg-pulse{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(68,136,255,0.08) 0%,transparent 70%);animation:bgPulse 4s ease-in-out infinite;pointer-events:none}
.app{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:0 24px}
/* Header */
.header{padding:52px 0 0;text-align:center}
.header-label{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mid);margin-bottom:8px}
.header-title{font-family:var(--display);font-size:22px;color:var(--text);letter-spacing:-0.5px}
/* Task input */
.task-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:24px;padding:20px 0}
.task-input-wrap{width:100%}
.task-label{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;text-align:center}
.task-input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px 20px;color:var(--text);font-family:var(--sans);font-size:18px;font-weight:500;outline:none;text-align:center;transition:border .2s}
.task-input:focus{border-color:var(--blue)}
.task-input::placeholder{color:var(--dim);font-size:15px}
/* Duration chips */
.dur-chips{display:flex;gap:10px;justify-content:center}
.dc{background:var(--panel);border:2px solid var(--border);border-radius:12px;padding:10px 18px;font-family:var(--display);font-size:16px;color:var(--mid);cursor:pointer;transition:all .15s}
.dc.active{border-color:var(--blue);color:var(--blue);background:rgba(68,136,255,.08)}
/* THE BIG BUTTON */
@keyframes buttonGlow{0%,100%{box-shadow:0 0 30px rgba(68,136,255,.3),0 0 60px rgba(68,136,255,.1)}50%{box-shadow:0 0 50px rgba(68,136,255,.5),0 0 100px rgba(68,136,255,.2)}}
@keyframes buttonActive{0%,100%{box-shadow:0 0 30px rgba(32,217,128,.4),0 0 80px rgba(32,217,128,.2)}50%{box-shadow:0 0 60px rgba(32,217,128,.6),0 0 120px rgba(32,217,128,.3)}}
.big-btn{width:220px;height:220px;border-radius:50%;border:none;font-family:var(--display);font-size:32px;letter-spacing:2px;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,#1a2a44,#0f1a30);border:3px solid var(--blue);box-shadow:0 0 30px rgba(68,136,255,.3),0 0 60px rgba(68,136,255,.1);animation:buttonGlow 3s ease-in-out infinite;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.big-btn:active{transform:scale(.95)}
.big-btn.running{border-color:var(--green);animation:buttonActive 2s ease-in-out infinite;background:linear-gradient(135deg,#0f2a1a,#081a10)}
.big-btn.running .btn-label{color:var(--green)}
.btn-icon{font-size:40px;line-height:1}
.btn-label{font-size:16px;letter-spacing:3px;color:var(--blue);font-family:var(--mono)}
/* Timer display */
.timer-display{font-family:var(--display);font-size:52px;letter-spacing:-2px;color:var(--text);text-align:center;line-height:1;min-height:60px;transition:color .3s}
.timer-display.urgent{color:#ff6060}
/* Progress ring */
.ring-wrap{position:relative;width:240px;height:240px;display:flex;align-items:center;justify-content:center}
.ring-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:4}
.ring-prog{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .3s;stroke-dasharray:691}
/* History */
.history-wrap{padding:16px 0 30px}
.history-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;text-align:center}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto}
.hist-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;justify-content:space-between;font-size:12px}
.hist-name{color:var(--mid)}.hist-dur{font-family:var(--mono);color:var(--green);font-size:11px}
/* State management */
.state-idle .ring-wrap,.state-idle .timer-display{display:none}
.state-running .task-area>:not(.ring-wrap):not(.timer-display){opacity:.3;pointer-events:none}
.state-done .task-area>:not(.ring-wrap):not(.history-wrap){opacity:.4}
</style>
</head>
<body>
<div class="bg-pulse"></div>
<div class="app state-idle" id="app">
<div class="header">
  <div class="header-label">ADHD Task Initiation</div>
  <div class="header-title">JUST START</div>
</div>
<div class="task-area" id="taskArea">
  <div class="task-input-wrap">
    <div class="task-label">What's the one thing?</div>
    <input class="task-input" id="taskInput" placeholder="Name the task..." maxlength="60"/>
  </div>
  <div class="dur-chips">
    <div class="dc active" onclick="setDur(5,this)">5m</div>
    <div class="dc" onclick="setDur(10,this)">10m</div>
    <div class="dc" onclick="setDur(15,this)">15m</div>
    <div class="dc" onclick="setDur(25,this)">25m</div>
  </div>
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="110"/>
      <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="110" stroke="var(--blue)"/>
    </svg>
    <button class="big-btn" id="bigBtn" onclick="handleBtn()">
      <div class="btn-icon" id="btnIcon">▶</div>
      <div class="btn-label" id="btnLabel">START</div>
    </button>
  </div>
  <div class="timer-display" id="timerDisplay">10:00</div>
  <div class="history-wrap">
    <div class="history-label">Today's Sessions</div>
    <div class="history-list" id="histList"></div>
  </div>
</div>
</div>
<script>
const KEY='launcher_v1';
let dur=10,timerSec=0,timerTotal=0,interval=null,running=false,taskName='';
let sessions=[];
try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);sessions=p.sessions||[];}}catch(_){}

function setDur(m,el){dur=m;document.querySelectorAll('.dc').forEach(c=>c.classList.remove('active'));el.classList.add('active');if(!running)updateDisplay();}
function updateDisplay(){const m=Math.floor(dur*60/60);const s=dur*60%60;document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}

function handleBtn(){if(!running)startTimer();else stopTimer();}

function startTimer(){
  taskName=document.getElementById('taskInput').value.trim()||'Task';
  timerTotal=dur*60;timerSec=timerTotal;running=true;
  document.getElementById('app').className='app state-running';
  document.getElementById('bigBtn').classList.add('running');
  document.getElementById('btnIcon').textContent='⏸';
  document.getElementById('btnLabel').textContent='PAUSE';
  interval=setInterval(tick,1000);
  tick();
}

function tick(){
  timerSec--;
  const m=Math.floor(timerSec/60),s=timerSec%60;
  const disp=document.getElementById('timerDisplay');
  disp.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  disp.className='timer-display'+(timerSec<60?' urgent':'');
  const prog=document.getElementById('ringProg');
  const pct=timerSec/timerTotal;
  prog.style.strokeDashoffset=691-(pct*691);
  prog.style.stroke=pct>0.5?'var(--blue)':pct>0.25?'#ffd060':'#ff6060';
  if(timerSec<=0){clearInterval(interval);complete();}
}

function stopTimer(){clearInterval(interval);running=false;document.getElementById('bigBtn').classList.remove('running');document.getElementById('btnIcon').textContent='▶';document.getElementById('btnLabel').textContent='RESUME';interval=setInterval(()=>{},0);clearInterval(interval);// restart
interval=null;
// Actually allow resume
document.getElementById('bigBtn').onclick=()=>{if(!running){running=true;interval=setInterval(tick,1000);document.getElementById('bigBtn').classList.add('running');document.getElementById('btnIcon').textContent='⏸';document.getElementById('btnLabel').textContent='PAUSE';}else stopTimer();};
}

function complete(){
  running=false;clearInterval(interval);
  const session={task:taskName,dur:dur,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
  sessions.unshift(session);if(sessions.length>20)sessions=sessions.slice(0,20);
  try{localStorage.setItem(KEY,JSON.stringify({sessions}));}catch(_){}
  document.getElementById('bigBtn').classList.remove('running');
  document.getElementById('btnIcon').textContent='✓';
  document.getElementById('btnLabel').textContent='DONE!';
  document.getElementById('bigBtn').style.borderColor='var(--green)';
  document.getElementById('bigBtn').style.animation='buttonActive 1s ease-in-out';
  document.getElementById('app').className='app state-done';
  renderHistory();
  setTimeout(()=>{
    document.getElementById('bigBtn').style.borderColor='var(--blue)';
    document.getElementById('bigBtn').style.animation='buttonGlow 3s ease-in-out infinite';
    document.getElementById('btnIcon').textContent='▶';document.getElementById('btnLabel').textContent='START';
    document.getElementById('app').className='app state-idle';
    document.getElementById('bigBtn').onclick=handleBtn;
    document.getElementById('ringProg').style.strokeDashoffset='691';
    updateDisplay();
  },3000);
}

function renderHistory(){
  const el=document.getElementById('histList');
  if(!sessions.length){el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:8px">No sessions yet today</div>';return;}
  el.innerHTML=sessions.slice(0,5).map(s=>`<div class="hist-item"><span class="hist-name">${s.task}</span><span class="hist-dur">${s.dur}m · ${s.time}</span></div>`).join('');
}

updateDisplay();renderHistory();
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('taskInput').blur();startTimer();}});
</script>
</body>
</html>
