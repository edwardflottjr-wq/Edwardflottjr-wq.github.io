<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INK OS — Client CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --card: #1a1a1a;
    --border: #2a2a2a; --gold: #b8965a; --gold-dim: #7a6038;
    --red: #c0392b; --green: #27ae60; --text: #e0e0e0;
    --muted: #666; --font-d: 'Cinzel', serif; --font-b: 'IBM Plex Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-b); min-height:100vh; }
  nav {
    display:flex; align-items:center; gap:1rem;
    padding:1rem 1.5rem; border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  nav a { color:var(--gold-dim); text-decoration:none; font-size:0.7rem; letter-spacing:0.2em; }
  nav a:hover { color:var(--gold); }
  .page-title { font-family:var(--font-d); font-size:1.2rem; letter-spacing:0.15em; margin-left:auto; margin-right:auto; }
  .layout { display:grid; grid-template-columns:320px 1fr; height:calc(100vh - 53px); }
  .sidebar { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header { padding:1rem; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:0.5rem; }
  .search { background:var(--card); border:1px solid var(--border); color:var(--text); font-family:var(--font-b); font-size:0.75rem; padding:0.6rem 0.75rem; border-radius:2px; width:100%; }
  .search:focus { outline:none; border-color:var(--gold-dim); }
  .btn { background:var(--gold); color:#000; border:none; font-family:var(--font-b); font-size:0.7rem; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; padding:0.6rem 1rem; cursor:pointer; border-radius:2px; transition:background 0.2s; }
  .btn:hover { background:#d4a96a; }
  .btn-outline { background:transparent; color:var(--gold); border:1px solid var(--gold-dim); }
  .btn-outline:hover { background:var(--gold-dim); color:#000; }
  .btn-danger { background:var(--red); color:#fff; }
  .btn-danger:hover { background:#e74c3c; }
  .btn-sm { padding:0.35rem 0.6rem; font-size:0.65rem; }
  .client-list { flex:1; overflow-y:auto; }
  .client-item {
    padding:0.9rem 1rem; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background 0.15s; display:flex; flex-direction:column; gap:0.2rem;
  }
  .client-item:hover { background:var(--surface); }
  .client-item.active { background:var(--card); border-left:2px solid var(--gold); }
  .ci-name { font-size:0.85rem; font-weight:500; }
  .ci-meta { font-size:0.65rem; color:var(--muted); display:flex; gap:0.75rem; }
  .badge { padding:0.15rem 0.4rem; border-radius:2px; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; }
  .badge-green { background:rgba(39,174,96,0.15); color:var(--green); }
  .badge-red { background:rgba(192,57,43,0.15); color:var(--red); }
  .badge-gold { background:rgba(184,150,90,0.15); color:var(--gold); }
  .main { overflow-y:auto; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:1rem; color:var(--muted); }
  .empty-icon { font-size:3rem; opacity:0.3; }
  .panel { padding:2rem; }
  .panel-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
  .client-name-big { font-family:var(--font-d); font-size:1.6rem; letter-spacing:0.1em; }
  .panel-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
  .section { margin-bottom:2rem; }
  .section-title { font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
  .info-field { display:flex; flex-direction:column; gap:0.25rem; }
  .field-label { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  .field-value { font-size:0.8rem; }
  .fitz-bar { display:flex; gap:4px; margin-top:0.25rem; }
  .fitz-swatch { width:24px; height:24px; border-radius:50%; border:2px solid transparent; cursor:default; }
  .fitz-swatch.active { border-color:var(--gold); }
  .session-list { display:flex; flex-direction:column; gap:0.5rem; }
  .session-item { background:var(--card); border:1px solid var(--border); padding:0.75rem; border-radius:2px; display:flex; justify-content:space-between; align-items:flex-start; }
  .session-meta { font-size:0.72rem; display:flex; flex-direction:column; gap:0.2rem; }
  .session-date { color:var(--gold); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:100; padding:1rem; }
  .modal { background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--gold); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; border-radius:2px; }
  .modal-header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-title { font-family:var(--font-d); font-size:1rem; letter-spacing:0.1em; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; }
  .modal-body { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .form-group { display:flex; flex-direction:column; gap:0.4rem; }
  .form-group.full { grid-column:1/-1; }
  label { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  input, select, textarea { background:var(--card); border:1px solid var(--border); color:var(--text); font-family:var(--font-b); font-size:0.78rem; padding:0.6rem 0.75rem; border-radius:2px; width:100%; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--gold-dim); }
  textarea { resize:vertical; min-height:70px; }
  .checkbox-group { display:flex; flex-wrap:wrap; gap:0.5rem; }
  .checkbox-label { display:flex; align-items:center; gap:0.4rem; font-size:0.72rem; cursor:pointer; }
  .checkbox-label input[type=checkbox] { width:auto; }
  .modal-footer { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:0.75rem; }
  .tag { display:inline-flex; align-items:center; gap:0.25rem; padding:0.2rem 0.5rem; background:var(--card); border:1px solid var(--border); border-radius:2px; font-size:0.65rem; }
  select option { background:var(--card); }
  @media(max-width:700px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { height:250px; border-right:none; border-bottom:1px solid var(--border); }
    .info-grid { grid-template-columns:1fr; }
    .form-row { grid-template-columns:1fr; }
  }
</style>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Client CRM">
  <script>
  (function(){
    var c=document.createElement('canvas');
    c.width=c.height=512;
    var ctx=c.getContext('2d');
    if(!ctx)return;
    
ctx.fillStyle='#0a0a0a';
ctx.fillRect(0,0,512,512);
// Person head
ctx.fillStyle='#b8965a';
ctx.beginPath();
ctx.arc(256,175,90,0,Math.PI*2);
ctx.fill();
// Person body arc
ctx.fillStyle='#e0e0e0';
ctx.beginPath();
ctx.arc(256,500,195,Math.PI*1.1,Math.PI*1.9);
ctx.lineTo(256,340);
ctx.fill();
// Gold collar ring
ctx.strokeStyle='#b8965a';
ctx.lineWidth=10;
ctx.beginPath();
ctx.arc(256,500,175,Math.PI*1.12,Math.PI*1.88);
ctx.stroke();
// Eye dots
ctx.fillStyle='#0a0a0a';
ctx.beginPath();ctx.arc(228,165,14,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(284,165,14,0,Math.PI*2);ctx.fill();
// Smile
ctx.strokeStyle='#0a0a0a';
ctx.lineWidth=8;
ctx.beginPath();
ctx.arc(256,190,35,0.2,Math.PI-0.2);
ctx.stroke();

    var link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.href=c.toDataURL('image/png');
    document.head.appendChild(link);
  })();
  </script>
</head>
<body>
<nav>
  <a href="index.html">← INK OS</a>
  <span class="page-title">Client CRM</span>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <input class="search" type="text" id="searchInput" placeholder="Search clients..." oninput="renderList()">
      <button class="btn" onclick="openModal()">+ New Client</button>
    </div>
    <div class="client-list" id="clientList"></div>
  </div>
  <div class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">👤</div>
      <div style="font-size:0.75rem;letter-spacing:0.2em;">SELECT OR CREATE A CLIENT</div>
    </div>
  </div>
</div>

<!-- Client Modal -->
<div class="modal-overlay" id="clientModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">New Client</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>First Name *</label><input id="f-fname" type="text"></div>
        <div class="form-group"><label>Last Name *</label><input id="f-lname" type="text"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Pronouns</label><input id="f-pronouns" type="text" placeholder="they/them"></div>
        <div class="form-group"><label>Phone</label><input id="f-phone" type="tel"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="f-email" type="email"></div>
        <div class="form-group"><label>Deposit Paid</label>
          <select id="f-deposit"><option value="no">No</option><option value="yes">Yes</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Deposit Amount ($)</label><input id="f-depositamt" type="number" placeholder="0"></div>
        <div class="form-group"><label>Fitzpatrick Skin Type (1–6)</label>
          <select id="f-fitz">
            <option value="">— select —</option>
            <option value="1">1 — Very fair, always burns</option>
            <option value="2">2 — Fair, usually burns</option>
            <option value="3">3 — Medium, sometimes burns</option>
            <option value="4">4 — Olive, rarely burns</option>
            <option value="5">5 — Brown, very rarely burns</option>
            <option value="6">6 — Dark brown/black, never burns</option>
          </select>
        </div>
      </div>
      <div class="form-group full">
        <label>Known Allergies</label>
        <input id="f-allergies" type="text" placeholder="latex, nickel, etc.">
      </div>
      <div class="form-group full">
        <label>Medical Flags</label>
        <div class="checkbox-group">
          <label class="checkbox-label"><input type="checkbox" name="med" value="bloodthinners"> Blood thinners</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="diabetes"> Diabetes</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="skinConditions"> Skin conditions</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="pregnancy"> Pregnancy</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="autoimmune"> Autoimmune</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="keloids"> Keloid history</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="heartCondition"> Heart condition</label>
          <label class="checkbox-label"><input type="checkbox" name="med" value="epilepsy"> Epilepsy</label>
        </div>
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Consultation notes, preferences, references..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<!-- Session Modal -->
<div class="modal-overlay" id="sessionModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Session</span>
      <button class="modal-close" onclick="document.getElementById('sessionModal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Date</label><input id="s-date" type="date"></div>
        <div class="form-group"><label>Body Placement</label><input id="s-placement" type="text" placeholder="upper arm, calf..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Style</label>
          <select id="s-style">
            <option>Realism</option><option>Portraiture</option><option>Traditional</option>
            <option>Neo-traditional</option><option>Blackwork</option><option>Linework</option>
            <option>Watercolor</option><option>Geometric</option><option>Trash polka</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Duration (hrs)</label><input id="s-duration" type="number" step="0.5" placeholder="3"></div>
      </div>
      <div class="form-group full"><label>Session Notes</label><textarea id="s-notes"></textarea></div>
      <div class="form-group full"><label>Healed Photo (optional)</label><input id="s-photo" type="file" accept="image/*"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('sessionModal').style.display='none'">Cancel</button>
      <button class="btn" onclick="saveSession()">Save Session</button>
    </div>
  </div>
</div>

<script>
let clients = JSON.parse(localStorage.getItem('ink_clients') || '[]');
let activeId = null;
let editId = null;

const FITZ_COLORS = ['#f5d5b8','#e8b89a','#d4956a','#b07040','#7a4820','#3d1c08'];
const FITZ_NAMES = ['I','II','III','IV','V','VI'];

function save() { localStorage.setItem('ink_clients', JSON.stringify(clients)); }

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = clients.filter(c =>
    (c.fname+' '+c.lname).toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q) ||
    (c.phone||'').includes(q)
  );
  const el = document.getElementById('clientList');
  if (!filtered.length) { el.innerHTML = '<div style="padding:1.5rem;font-size:0.72rem;color:var(--muted);text-align:center;">No clients found</div>'; return; }
  el.innerHTML = filtered.map(c => `
    <div class="client-item ${c.id===activeId?'active':''}" onclick="selectClient('${c.id}')">
      <span class="ci-name">${c.fname} ${c.lname}</span>
      <div class="ci-meta">
        <span>${c.sessions?.length||0} session${(c.sessions?.length||0)!==1?'s':''}</span>
        <span class="${c.deposit==='yes'?'badge badge-green':'badge badge-red'}">${c.deposit==='yes'?'Deposit ✓':'No deposit'}</span>
      </div>
    </div>
  `).join('');
}

function selectClient(id) {
  activeId = id;
  const c = clients.find(x=>x.id===id);
  if (!c) return;
  renderList();

  const medFlags = (c.medFlags||[]).map(m=>`<span class="tag">${m}</span>`).join('');
  const fitzColor = c.fitz ? FITZ_COLORS[+c.fitz-1] : null;
  const fitzLabel = c.fitz ? `Type ${FITZ_NAMES[+c.fitz-1]} — ${['Very fair','Fair','Medium','Olive','Brown','Dark'][+c.fitz-1]}` : '—';

  const sessions = (c.sessions||[]).slice().reverse().map(s => `
    <div class="session-item">
      <div class="session-meta">
        <span class="session-date">${s.date}</span>
        <span>${s.style} · ${s.placement}</span>
        ${s.duration?`<span>${s.duration}h</span>`:''}
        ${s.notes?`<span style="color:var(--muted)">${s.notes}</span>`:''}
      </div>
      ${s.photo?`<img src="${s.photo}" style="width:60px;height:60px;object-fit:cover;border-radius:2px;border:1px solid var(--border)" alt="healed">`:''}
    </div>
  `).join('');

  document.getElementById('mainPanel').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="client-name-big">${c.fname} ${c.lname}</div>
          ${c.pronouns?`<div style="font-size:0.7rem;color:var(--muted);margin-top:0.25rem">${c.pronouns}</div>`:''}
        </div>
        <div class="panel-actions">
          <button class="btn btn-sm btn-outline" onclick="openModal('${c.id}')">Edit</button>
          <button class="btn btn-sm" onclick="openSessionModal('${c.id}')">+ Session</button>
          <button class="btn btn-sm btn-danger" onclick="deleteClient('${c.id}')">Delete</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Contact</div>
        <div class="info-grid">
          <div class="info-field"><span class="field-label">Phone</span><span class="field-value">${c.phone||'—'}</span></div>
          <div class="info-field"><span class="field-label">Email</span><span class="field-value">${c.email||'—'}</span></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Skin & Health</div>
        <div class="info-grid">
          <div class="info-field">
            <span class="field-label">Fitzpatrick Type</span>
            <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem">
              ${fitzColor?`<div style="width:20px;height:20px;border-radius:50%;background:${fitzColor};border:1px solid var(--border)"></div>`:''}
              <span class="field-value">${fitzLabel}</span>
            </div>
          </div>
          <div class="info-field"><span class="field-label">Allergies</span><span class="field-value">${c.allergies||'None noted'}</span></div>
          <div class="info-field full"><span class="field-label">Medical Flags</span><div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.3rem">${medFlags||'<span style="color:var(--muted);font-size:0.72rem">None</span>'}</div></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Deposit</div>
        <div class="info-grid">
          <div class="info-field"><span class="field-label">Status</span><span class="badge ${c.deposit==='yes'?'badge-green':'badge-red'}">${c.deposit==='yes'?'Paid':'Not paid'}</span></div>
          <div class="info-field"><span class="field-label">Amount</span><span class="field-value">${c.depositamt?'$'+c.depositamt:'—'}</span></div>
        </div>
      </div>

      ${c.notes?`<div class="section"><div class="section-title">Notes</div><div style="font-size:0.78rem;line-height:1.7;color:var(--muted)">${c.notes}</div></div>`:''}

      <div class="section">
        <div class="section-title">Session History (${(c.sessions||[]).length})</div>
        ${sessions || '<div style="font-size:0.72rem;color:var(--muted)">No sessions yet</div>'}
      </div>
    </div>
  `;
}

function openModal(id) {
  editId = id || null;
  const c = id ? clients.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = c ? 'Edit Client' : 'New Client';
  document.getElementById('f-fname').value = c?.fname||'';
  document.getElementById('f-lname').value = c?.lname||'';
  document.getElementById('f-pronouns').value = c?.pronouns||'';
  document.getElementById('f-phone').value = c?.phone||'';
  document.getElementById('f-email').value = c?.email||'';
  document.getElementById('f-deposit').value = c?.deposit||'no';
  document.getElementById('f-depositamt').value = c?.depositamt||'';
  document.getElementById('f-fitz').value = c?.fitz||'';
  document.getElementById('f-allergies').value = c?.allergies||'';
  document.getElementById('f-notes').value = c?.notes||'';
  document.querySelectorAll('input[name=med]').forEach(cb => {
    cb.checked = (c?.medFlags||[]).includes(cb.value);
  });
  document.getElementById('clientModal').style.display='flex';
}
function closeModal() { document.getElementById('clientModal').style.display='none'; }

function saveClient() {
  const fname = document.getElementById('f-fname').value.trim();
  const lname = document.getElementById('f-lname').value.trim();
  if (!fname || !lname) { alert('Name is required.'); return; }
  const medFlags = [...document.querySelectorAll('input[name=med]:checked')].map(cb=>cb.value);
  const data = {
    fname, lname,
    pronouns: document.getElementById('f-pronouns').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    deposit: document.getElementById('f-deposit').value,
    depositamt: document.getElementById('f-depositamt').value,
    fitz: document.getElementById('f-fitz').value,
    allergies: document.getElementById('f-allergies').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    medFlags
  };
  if (editId) {
    const i = clients.findIndex(x=>x.id===editId);
    clients[i] = { ...clients[i], ...data };
  } else {
    data.id = Date.now().toString();
    data.sessions = [];
    data.createdAt = new Date().toISOString();
    clients.push(data);
    activeId = data.id;
  }
  save(); renderList(); closeModal();
  if (activeId) selectClient(activeId);
}

function deleteClient(id) {
  if (!confirm('Delete this client? This cannot be undone.')) return;
  clients = clients.filter(x=>x.id!==id);
  activeId = null; save(); renderList();
  document.getElementById('mainPanel').innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div style="font-size:0.75rem;letter-spacing:0.2em;">SELECT OR CREATE A CLIENT</div></div>';
}

function openSessionModal(clientId) {
  activeId = clientId;
  document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('s-placement').value='';
  document.getElementById('s-notes').value='';
  document.getElementById('s-duration').value='';
  document.getElementById('sessionModal').style.display='flex';
}

function saveSession() {
  const c = clients.find(x=>x.id===activeId);
  if (!c) return;
  const photoFile = document.getElementById('s-photo').files[0];
  const doSave = (photoData) => {
    const session = {
      id: Date.now().toString(),
      date: document.getElementById('s-date').value,
      placement: document.getElementById('s-placement').value.trim(),
      style: document.getElementById('s-style').value,
      duration: document.getElementById('s-duration').value,
      notes: document.getElementById('s-notes').value.trim(),
      photo: photoData||null
    };
    if (!c.sessions) c.sessions=[];
    c.sessions.push(session);
    save();
    document.getElementById('sessionModal').style.display='none';
    selectClient(activeId);
  };
  if (photoFile) {
    const r = new FileReader();
    r.onload = e => doSave(e.target.result);
    r.readAsDataURL(photoFile);
  } else { doSave(null); }
}

renderList();
</script>
