<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Home Base">
<meta name="theme-color" content="#0e1208">
<title>Home Base — Shannon & Micco</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1208;--panel:#141a0c;--panel2:#1a2210;--border:#243018;--border2:#2e3e20;--text:#d8eecc;--dim:#3a5020;--mid:#6a8848;--green:#80c840;--green-dim:rgba(128,200,64,0.1);--amber:#d8b030;--amber-dim:rgba(216,176,48,0.1);--blue:#60b0e0;--red:#e07070;--pink:#f0a0b8;--sans:'Quicksand',sans-serif;--mono:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(128,200,64,0.06) 0%,transparent 60%);pointer-events:none}
.app{position:relative;z-index:1}
.header{padding:52px 22px 16px;text-align:center;border-bottom:1px solid var(--border)}
.header-icon{font-size:44px;margin-bottom:8px}
.header-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px}
.header-sub{font-size:13px;color:var(--mid)}
/* Person tabs */
.person-tabs{display:flex;padding:12px 22px;gap:8px;border-bottom:1px solid var(--border)}
.person-tab{flex:1;background:var(--panel);border:2px solid var(--border2);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.person-tab.active.shannon{border-color:var(--pink);background:rgba(240,160,184,.08)}
.person-tab.active.micco{border-color:var(--amber);background:rgba(216,176,48,.08)}
.person-tab.active.home{border-color:var(--green);background:var(--green-dim)}
.tab-icon{font-size:24px;margin-bottom:4px}
.tab-name{font-size:12px;font-weight:700;color:var(--mid)}
.person-tab.active .tab-name{color:var(--text)}
/* Content section */
.content{padding:16px 22px;display:flex;flex-direction:column;gap:12px;padding-bottom:100px}
/* Info card */
.info-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.info-card-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.info-card-title{font-size:13px;font-weight:700;color:var(--text)}
.info-edit-btn{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mid);background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer}
.info-rows{padding:4px 0}
.info-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.info-row:last-child{border:none}
.info-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mid);flex-shrink:0;padding-top:2px}
.info-value{font-size:13px;font-weight:600;color:var(--text);text-align:right;line-height:1.4}
/* Quick log */
.quick-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
.quick-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick-btn{background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.quick-btn:active{transform:scale(.96)}
.quick-btn-icon{font-size:22px;margin-bottom:4px}
.quick-btn-label{font-size:11px;font-weight:700;color:var(--mid)}
.quick-btn.done{background:var(--green-dim);border-color:var(--green)}
.quick-btn.done .quick-btn-label{color:var(--green)}
/* Notes area */
.notes-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}
.notes-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.notes-ta{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;resize:none;outline:none;line-height:1.6;min-height:80px}
.notes-ta::placeholder{color:var(--dim)}
.notes-ta:focus{border-color:var(--green)}
.save-notes-btn{margin-top:8px;width:100%;background:var(--green);border:none;border-radius:8px;padding:10px;font-family:var(--sans);font-size:13px;font-weight:700;color:#000;cursor:pointer}
/* Emergency card */
.emerg-card{background:rgba(224,112,112,.06);border:1px solid rgba(224,112,112,.2);border-radius:14px;padding:14px 16px}
.emerg-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.emerg-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(224,112,112,.1);font-size:12px}
.emerg-row:last-child{border:none}
.emerg-label{color:var(--mid)}
.emerg-val{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:500}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#000;font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:9px 22px;border-radius:99px;opacity:0;transition:all .25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-icon">🏡</div>
  <div class="header-title">Home Base</div>
  <div class="header-sub">Shannon · Micco · Household</div>
</div>
<div class="person-tabs">
  <div class="person-tab active shannon" onclick="setTab('shannon',this)" id="tab-shannon">
    <div class="tab-icon">👩</div><div class="tab-name">Shannon</div>
  </div>
  <div class="person-tab micco" onclick="setTab('micco',this)" id="tab-micco">
    <div class="tab-icon">🐕</div><div class="tab-name">Micco</div>
  </div>
  <div class="person-tab home" onclick="setTab('home',this)" id="tab-home">
    <div class="tab-icon">🏠</div><div class="tab-name">House</div>
  </div>
</div>
<div class="content" id="content"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='household_v1';
const TODAY=new Date().toISOString().split('T')[0];
let state={
  shannon:{notes:'',schedule:''},
  micco:{fedAM:null,fedPM:null,walkedAM:null,walkedPM:null,lastDate:'',notes:''},
  house:{notes:'',todos:[]},
};
let currentTab='shannon';

function load(){try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);state={...state,...p};}}catch(_){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(_){}}

function resetMiccoIfNewDay(){if(state.micco.lastDate!==TODAY){state.micco.fedAM=false;state.micco.fedPM=false;state.micco.walkedAM=false;state.micco.walkedPM=false;state.micco.lastDate=TODAY;save();}}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.person-tab').forEach(t=>{t.classList.remove('active');});
  el.classList.add('active');
  render();
}

function render(){
  const el=document.getElementById('content');
  if(currentTab==='shannon')renderShannon(el);
  else if(currentTab==='micco'){resetMiccoIfNewDay();renderMicco(el);}
  else renderHome(el);
}

function renderShannon(el){
  el.innerHTML=`
    <div class="info-card">
      <div class="info-card-head"><div class="info-card-title">Shannon's Info</div></div>
      <div class="info-rows">
        <div class="info-row"><div class="info-label">Relationship</div><div class="info-value">Wife ❤️</div></div>
        <div class="info-row"><div class="info-label">Schedule</div><div class="info-value"><textarea class="notes-ta" id="shanSchedule" placeholder="Shannon's work schedule..." style="min-height:50px;font-size:12px">${state.shannon.schedule||''}</textarea></div></div>
      </div>
    </div>
    <div class="notes-card">
      <div class="notes-title">Notes for Shannon</div>
      <textarea class="notes-ta" id="shanNotes" placeholder="Things to tell Shannon, reminders, don't forget...">${state.shannon.notes||''}</textarea>
      <button class="save-notes-btn" onclick="saveShannon()">Save</button>
    </div>`;
}

function saveShannon(){
  state.shannon.notes=document.getElementById('shanNotes').value;
  state.shannon.schedule=document.getElementById('shanSchedule').value;
  save();showToast('Saved ✓');
}

function renderMicco(el){
  const m=state.micco;
  el.innerHTML=`
    <div class="emerg-card">
      <div class="emerg-title">🚨 Vet Emergency</div>
      <div class="emerg-row"><div class="emerg-label">Breed</div><div class="emerg-val">American Akita, 4yrs</div></div>
      <div class="emerg-row"><div class="emerg-label">Weight</div><div class="emerg-val">Edit below</div></div>
      <div class="emerg-row"><div class="emerg-label">Vet</div><div class="emerg-val">Edit below</div></div>
    </div>
    <div class="info-card">
      <div class="info-card-head"><div class="info-card-title">Micco's Details</div></div>
      <div class="info-rows">
        <div class="info-row"><div class="info-label">Name</div><div class="info-value">Micco 🐕</div></div>
        <div class="info-row"><div class="info-label">Breed</div><div class="info-value">American Akita</div></div>
        <div class="info-row"><div class="info-label">Age</div><div class="info-value">4 years old</div></div>
      </div>
    </div>
    <div class="quick-card">
      <div class="quick-title">Today's Care — ${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
      <div class="quick-grid">
        <div class="quick-btn ${m.fedAM?'done':''}" onclick="toggleMicco('fedAM')"><div class="quick-btn-icon">🍖</div><div class="quick-btn-label">${m.fedAM?'✓ Fed AM':'Feed AM'}</div></div>
        <div class="quick-btn ${m.fedPM?'done':''}" onclick="toggleMicco('fedPM')"><div class="quick-btn-icon">🍖</div><div class="quick-btn-label">${m.fedPM?'✓ Fed PM':'Feed PM'}</div></div>
        <div class="quick-btn ${m.walkedAM?'done':''}" onclick="toggleMicco('walkedAM')"><div class="quick-btn-icon">🦮</div><div class="quick-btn-label">${m.walkedAM?'✓ Walk AM':'Walk AM'}</div></div>
        <div class="quick-btn ${m.walkedPM?'done':''}" onclick="toggleMicco('walkedPM')"><div class="quick-btn-icon">🦮</div><div class="quick-btn-label">${m.walkedPM?'✓ Walk PM':'Walk PM'}</div></div>
      </div>
    </div>
    <div class="notes-card">
      <div class="notes-title">Micco Notes</div>
      <textarea class="notes-ta" id="miccoNotes" placeholder="Vet info, medications, anything to remember...">${m.notes||''}</textarea>
      <button class="save-notes-btn" onclick="saveMiccoNotes()">Save</button>
    </div>`;
}

function toggleMicco(key){state.micco[key]=!state.micco[key];save();renderMicco(document.getElementById('content'));showToast(state.micco[key]?'✓ Done!':'Unmarked');}
function saveMiccoNotes(){state.micco.notes=document.getElementById('miccoNotes').value;save();showToast('Saved ✓');}

function renderHome(el){
  el.innerHTML=`
    <div class="info-card">
      <div class="info-card-head"><div class="info-card-title">Fort Bragg, CA</div></div>
      <div class="info-rows">
        <div class="info-row"><div class="info-label">Location</div><div class="info-value">Fort Bragg, Mendocino County</div></div>
      </div>
    </div>
    <div class="notes-card">
      <div class="notes-title">House Notes</div>
      <textarea class="notes-ta" id="houseNotes" placeholder="Maintenance, reminders, things to fix...">${state.house.notes||''}</textarea>
      <button class="save-notes-btn" onclick="saveHouseNotes()">Save</button>
    </div>`;
}

function saveHouseNotes(){state.house.notes=document.getElementById('houseNotes').value;save();showToast('Saved ✓');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

load();render();
</script>
</body>
</html>
