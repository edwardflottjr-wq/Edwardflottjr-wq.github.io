<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INK OS — Appointment Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#141414; --card:#1a1a1a;
    --border:#2a2a2a; --gold:#b8965a; --gold-dim:#7a6038;
    --red:#c0392b; --green:#27ae60; --text:#e0e0e0; --muted:#666;
    --font-d:'Cinzel',serif; --font-b:'IBM Plex Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
  nav{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
  nav a{color:var(--gold-dim);text-decoration:none;font-size:0.7rem;letter-spacing:0.2em;}
  nav a:hover{color:var(--gold);}
  .page-title{font-family:var(--font-d);font-size:1.2rem;letter-spacing:0.15em;margin:0 auto;}
  .toolbar{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .week-nav{display:flex;align-items:center;gap:0.75rem;}
  .week-label{font-family:var(--font-d);font-size:0.9rem;letter-spacing:0.1em;min-width:180px;text-align:center;}
  .icon-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:32px;height:32px;cursor:pointer;border-radius:2px;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s;}
  .icon-btn:hover{border-color:var(--gold);}
  .btn{background:var(--gold);color:#000;border:none;font-family:var(--font-b);font-size:0.7rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:0.55rem 1rem;cursor:pointer;border-radius:2px;transition:background 0.2s;}
  .btn:hover{background:#d4a96a;}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);}
  .btn-outline:hover{background:var(--gold-dim);color:#000;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-danger:hover{background:#e74c3c;}
  .btn-sm{padding:0.3rem 0.6rem;font-size:0.65rem;}
  .stats-bar{display:flex;gap:1.5rem;margin-left:auto;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:0.1rem;text-align:right;}
  .stat-val{font-family:var(--font-d);font-size:1rem;color:var(--gold);}
  .stat-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  .day-header{background:var(--surface);padding:0.75rem 0.5rem;text-align:center;}
  .day-name{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  .day-num{font-family:var(--font-d);font-size:1.1rem;margin-top:0.1rem;}
  .day-header.today .day-num{color:var(--gold);}
  .day-header.today{border-top:2px solid var(--gold);}
  .week-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);min-height:calc(100vh - 250px);}
  .day-col{background:var(--bg);padding:0.5rem;display:flex;flex-direction:column;gap:0.4rem;}
  .appt-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:0.5rem;border-radius:2px;cursor:pointer;transition:border-color 0.2s;}
  .appt-card:hover{border-color:var(--gold);}
  .appt-card.no-show{border-left-color:var(--red);opacity:0.6;}
  .appt-card.complete{border-left-color:var(--green);}
  .appt-time{font-size:0.65rem;color:var(--gold);margin-bottom:0.2rem;}
  .appt-name{font-size:0.75rem;font-weight:500;}
  .appt-meta{font-size:0.6rem;color:var(--muted);margin-top:0.15rem;}
  .add-slot{border:1px dashed var(--border);padding:0.4rem;border-radius:2px;text-align:center;font-size:0.6rem;color:var(--muted);cursor:pointer;transition:border-color 0.2s;}
  .add-slot:hover{border-color:var(--gold-dim);color:var(--gold-dim);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
  .modal{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--gold);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:2px;}
  .modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-title{font-family:var(--font-d);font-size:1rem;letter-spacing:0.1em;}
  .modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;}
  .modal-body{padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .form-group{display:flex;flex-direction:column;gap:0.4rem;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  input,select,textarea{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:0.78rem;padding:0.6rem 0.75rem;border-radius:2px;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-dim);}
  select option{background:var(--card);}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:0.75rem;}
  .hourly-input{display:flex;align-items:center;gap:0.5rem;}
  .hourly-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  @media(max-width:700px){
    .week-grid,.week-body{grid-template-columns:repeat(7,minmax(90px,1fr));overflow-x:auto;}
    .stats-bar{margin-left:0;}
  }
</style>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Scheduler">
  <script>
  (function(){
    var c=document.createElement('canvas');
    c.width=c.height=512;
    var ctx=c.getContext('2d');
    if(!ctx)return;
    
ctx.fillStyle='#0a0a0a';
ctx.fillRect(0,0,512,512);
// Calendar body
ctx.fillStyle='#1a1a1a';
ctx.strokeStyle='#b8965a';
ctx.lineWidth=12;
ctx.beginPath();
ctx.roundRect(64,96,384,368,20);
ctx.fill();ctx.stroke();
// Header bar
ctx.fillStyle='#b8965a';
ctx.beginPath();
ctx.roundRect(64,96,384,90,{upperLeft:20,upperRight:20,lowerLeft:0,lowerRight:0});
ctx.fill();
// Calendar hooks
ctx.fillStyle='#e0e0e0';
ctx.beginPath();ctx.roundRect(160,60,30,80,15);ctx.fill();
ctx.beginPath();ctx.roundRect(322,60,30,80,15);ctx.fill();
// Month label
ctx.fillStyle='#0a0a0a';
ctx.font='bold 48px monospace';
ctx.textAlign='center';
ctx.fillText('MAR',256,158);
// Grid dots
const cols=[120,188,256,324,392];
const rows=[240,300,360,420];
for(let r of rows){
  for(let c of cols){
    ctx.fillStyle='#444';
    ctx.beginPath();ctx.arc(c,r,12,0,Math.PI*2);ctx.fill();
  }
}
// Highlight one cell
ctx.fillStyle='#b8965a';
ctx.beginPath();ctx.arc(256,300,16,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';
ctx.font='bold 14px monospace';
ctx.fillText('13',256,305);

    var link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.href=c.toDataURL('image/png');
    document.head.appendChild(link);
  })();
  </script>
</head>
<body>
<nav>
  <a href="index.html">← INK OS</a>
  <span class="page-title">Appointment Scheduler</span>
</nav>
<div class="toolbar">
  <div class="week-nav">
    <button class="icon-btn" onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="icon-btn" onclick="changeWeek(1)">›</button>
    <button class="icon-btn" onclick="goToday()" title="Today">⌖</button>
  </div>
  <button class="btn" onclick="openModal()">+ Appointment</button>
  <div class="stats-bar">
    <div class="stat"><span class="stat-val" id="statAppts">0</span><span class="stat-label">This week</span></div>
    <div class="stat"><span class="stat-val" id="statRev">$0</span><span class="stat-label">Est. Revenue</span></div>
    <div class="hourly-input">
      <span class="hourly-label">$/hr</span>
      <input type="number" id="hourlyRate" value="150" style="width:70px;padding:0.4rem 0.5rem;font-size:0.75rem;" oninput="renderWeek()">
    </div>
  </div>
</div>

<div id="weekGrid"></div>

<!-- Appointment Modal -->
<div class="modal-overlay" id="apptModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">New Appointment</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Client Name *</label><input id="a-name" type="text"></div>
        <div class="form-group"><label>Date *</label><input id="a-date" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Start Time</label><input id="a-time" type="time" value="10:00"></div>
        <div class="form-group"><label>Duration (hrs)</label><input id="a-dur" type="number" step="0.5" min="0.5" value="3"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Session Type</label>
          <select id="a-type">
            <option>Consultation</option><option>Full Session</option>
            <option>Touch-Up</option><option>Cover-Up</option><option>Continuation</option>
          </select>
        </div>
        <div class="form-group"><label>Deposit Status</label>
          <select id="a-deposit"><option value="no">Not paid</option><option value="yes">Paid</option></select>
        </div>
      </div>
      <div class="form-group full"><label>Notes</label><textarea id="a-notes" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-sm btn-danger" id="noShowBtn" onclick="markNoShow()" style="display:none">Mark No-Show</button>
        <button class="btn btn-sm btn-outline" id="completeBtn" onclick="markComplete()" style="display:none">Mark Complete</button>
        <button class="btn btn-sm btn-danger" id="deleteBtn" onclick="deleteAppt()" style="display:none">Delete</button>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm" onclick="saveAppt()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
let appts = JSON.parse(localStorage.getItem('ink_appts') || '[]');
let editId = null;
let weekStart = getMonday(new Date());

function save() { localStorage.setItem('ink_appts', JSON.stringify(appts)); }

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day===0?-6:1);
  date.setDate(diff);
  date.setHours(0,0,0,0);
  return date;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate()+n);
  return r;
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function changeWeek(n) {
  weekStart = addDays(weekStart, n*7);
  renderWeek();
}

function goToday() {
  weekStart = getMonday(new Date());
  renderWeek();
}

function renderWeek() {
  const today = fmt(new Date());
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const weekDates = Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const startD = weekDates[0], endD = weekDates[6];
  document.getElementById('weekLabel').textContent =
    `${months[startD.getMonth()]} ${startD.getDate()} – ${startD.getMonth()!==endD.getMonth()?months[endD.getMonth()]+' ':''}${endD.getDate()}, ${endD.getFullYear()}`;

  const rate = parseFloat(document.getElementById('hourlyRate').value)||150;
  const weekAppts = appts.filter(a=>weekDates.some(d=>fmt(d)===a.date));
  const totalHours = weekAppts.filter(a=>a.status!=='no-show').reduce((s,a)=>s+(parseFloat(a.dur)||0),0);
  document.getElementById('statAppts').textContent = weekAppts.length;
  document.getElementById('statRev').textContent = '$'+(totalHours*rate).toFixed(0);

  let headers = '<div class="week-grid">';
  let cols = '<div class="week-body">';

  weekDates.forEach((d,i) => {
    const dateStr = fmt(d);
    const isToday = dateStr===today;
    headers += `<div class="day-header${isToday?' today':''}"><div class="day-name">${days[i]}</div><div class="day-num">${d.getDate()}</div></div>`;
    const dayAppts = appts.filter(a=>a.date===dateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    const apptCards = dayAppts.map(a=>`
      <div class="appt-card ${a.status||''}" onclick="openModal('${a.id}')">
        <div class="appt-time">${a.time||''} ${a.dur?'('+a.dur+'h)':''}</div>
        <div class="appt-name">${a.name}</div>
        <div class="appt-meta">${a.type||''} ${a.deposit==='yes'?'· ✓ dep':''} ${a.status==='no-show'?'· NO-SHOW':''} ${a.status==='complete'?'· ✓ DONE':''}</div>
      </div>
    `).join('');
    cols += `<div class="day-col">${apptCards}<div class="add-slot" onclick="openModalForDate('${dateStr}')">+ add</div></div>`;
  });

  headers += '</div>';
  cols += '</div>';
  document.getElementById('weekGrid').innerHTML = headers + cols;
}

function openModal(id) {
  editId = id||null;
  const a = id ? appts.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = a?'Edit Appointment':'New Appointment';
  document.getElementById('a-name').value = a?.name||'';
  document.getElementById('a-date').value = a?.date||fmt(new Date());
  document.getElementById('a-time').value = a?.time||'10:00';
  document.getElementById('a-dur').value = a?.dur||3;
  document.getElementById('a-type').value = a?.type||'Full Session';
  document.getElementById('a-deposit').value = a?.deposit||'no';
  document.getElementById('a-notes').value = a?.notes||'';
  document.getElementById('noShowBtn').style.display = a?'inline-flex':'none';
  document.getElementById('completeBtn').style.display = a?'inline-flex':'none';
  document.getElementById('deleteBtn').style.display = a?'inline-flex':'none';
  document.getElementById('apptModal').style.display='flex';
}

function openModalForDate(date) {
  openModal();
  document.getElementById('a-date').value = date;
}

function closeModal() { document.getElementById('apptModal').style.display='none'; }

function saveAppt() {
  const name = document.getElementById('a-name').value.trim();
  if (!name) { alert('Client name required.'); return; }
  const data = {
    name, date: document.getElementById('a-date').value,
    time: document.getElementById('a-time').value,
    dur: document.getElementById('a-dur').value,
    type: document.getElementById('a-type').value,
    deposit: document.getElementById('a-deposit').value,
    notes: document.getElementById('a-notes').value.trim()
  };
  if (editId) {
    const i = appts.findIndex(x=>x.id===editId);
    appts[i] = { ...appts[i], ...data };
  } else {
    data.id = Date.now().toString();
    appts.push(data);
  }
  save(); closeModal(); renderWeek();
}

function markNoShow() {
  if (!editId) return;
  const i = appts.findIndex(x=>x.id===editId);
  appts[i].status = appts[i].status==='no-show'?'':  'no-show';
  save(); closeModal(); renderWeek();
}

function markComplete() {
  if (!editId) return;
  const i = appts.findIndex(x=>x.id===editId);
  appts[i].status = 'complete';
  save(); closeModal(); renderWeek();
}

function deleteAppt() {
  if (!editId || !confirm('Delete this appointment?')) return;
  appts = appts.filter(x=>x.id!==editId);
  save(); closeModal(); renderWeek();
}

renderWeek();
</script>
</body>
</html>
