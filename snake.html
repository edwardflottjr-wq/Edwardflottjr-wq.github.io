<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --grid: #111118;
    --snake: #39ff14;
    --snake-head: #a0ff70;
    --food: #ff3c3c;
    --text: #39ff14;
    --dim: #1e3a1e;
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    user-select: none;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 0.3em;
    margin-bottom: 1rem;
    text-shadow: 0 0 20px var(--snake), 0 0 40px var(--snake);
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  #scorebar {
    display: flex;
    gap: 3rem;
    margin-bottom: 0.8rem;
    font-size: 0.6rem;
    color: var(--text);
  }

  #canvas-wrap {
    position: relative;
  }

  canvas {
    display: block;
    border: 2px solid var(--dim);
    box-shadow: 0 0 30px #39ff1420, inset 0 0 30px #00000080;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0fee;
    gap: 1.2rem;
  }

  #overlay h2 {
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--food);
    text-shadow: 0 0 15px var(--food);
  }

  #overlay p {
    font-size: 0.45rem;
    color: #aaa;
    line-height: 1.8;
    text-align: center;
  }

  button {
    margin-top: 0.5rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    padding: 0.7rem 1.4rem;
    background: transparent;
    border: 2px solid var(--snake);
    color: var(--snake);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
    text-shadow: 0 0 10px var(--snake);
    box-shadow: 0 0 12px #39ff1440;
  }

  button:hover {
    background: var(--snake);
    color: #000;
  }

  #hint {
    font-size: 0.4rem;
    color: #444;
    margin-top: 0.8rem;
    letter-spacing: 0.1em;
  }

  /* Mobile d-pad */
  #dpad {
    display: none;
    margin-top: 1.2rem;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(3, 48px);
    gap: 4px;
  }

  #dpad button {
    width: 48px; height: 48px;
    font-size: 1rem;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }

  @media (max-width: 520px) {
    #dpad { display: grid; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="scorebar">
  <span>SCORE: <span id="score">0</span></span>
  <span>BEST: <span id="best">0</span></span>
  <span>LVL: <span id="level">1</span></span>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">USE ARROW KEYS<br>OR WASD TO MOVE</p>
    <button id="btn">START GAME</button>
  </div>
</div>

<div id="hint">ARROW KEYS / WASD</div>

<div id="dpad">
  <div></div>
  <button data-dir="UP">▲</button>
  <div></div>
  <button data-dir="LEFT">◀</button>
  <div></div>
  <button data-dir="RIGHT">▶</button>
  <div></div>
  <button data-dir="DOWN">▼</button>
  <div></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, score, best=0, level, ticks, speed, running, raf;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const oTitle  = document.getElementById('overlay-title');
const oMsg    = document.getElementById('overlay-msg');
const btn     = document.getElementById('btn');

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0; level = 1; ticks = 0; speed = 10;
  placeFood();
  updateUI();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function step() {
  dir = {...nextDir};
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

  // Wall collision
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) { return gameOver(); }
  // Self collision
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) { return gameOver(); }

  snake.unshift(head);

  if (head.x===food.x&&head.y===food.y) {
    score++;
    if (score % 5 === 0) { level++; speed = Math.min(20, speed+2); }
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
}

function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  if (score > best) { best = score; bestEl.textContent = best; }
}

function draw() {
  // Background grid
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#111118';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if((r+c)%2===0) ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }

  // Food pulse
  const pulse = 0.85 + 0.15*Math.sin(Date.now()/200);
  ctx.fillStyle = `rgba(255,60,60,${pulse})`;
  ctx.shadowColor = '#ff3c3c';
  ctx.shadowBlur = 12*pulse;
  ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);
  ctx.shadowBlur = 0;

  // Snake body
  snake.forEach((seg,i) => {
    const isHead = i===0;
    ctx.fillStyle = isHead ? '#a0ff70' : '#39ff14';
    ctx.shadowColor = isHead ? '#a0ff70' : '#39ff14';
    ctx.shadowBlur = isHead ? 16 : 6;
    const pad = isHead ? 1 : 2;
    ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
  });
  ctx.shadowBlur = 0;
}

let last = 0;
function loop(ts) {
  if (!running) return;
  raf = requestAnimationFrame(loop);
  const elapsed = ts - last;
  const interval = 1000 / speed;
  draw();
  if (elapsed > interval) {
    last = ts - (elapsed % interval);
    step();
  }
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  last = 0;
  raf = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  cancelAnimationFrame(raf);
  oTitle.textContent = 'GAME OVER';
  oMsg.innerHTML = `SCORE: ${score}<br>BEST: ${best}`;
  btn.textContent = 'PLAY AGAIN';
  overlay.style.display = 'flex';
}

btn.addEventListener('click', startGame);

// Keyboard
const dirMap = {
  ArrowUp:{x:0,y:-1}, w:{x:0,y:-1},
  ArrowDown:{x:0,y:1}, s:{x:0,y:1},
  ArrowLeft:{x:-1,y:0}, a:{x:-1,y:0},
  ArrowRight:{x:1,y:0}, d:{x:1,y:0},
};
document.addEventListener('keydown', e => {
  const d = dirMap[e.key];
  if (d && !(d.x===-dir.x&&d.y===-dir.y)) { nextDir = d; e.preventDefault(); }
});

// D-pad (mobile)
document.querySelectorAll('#dpad button').forEach(b => {
  b.addEventListener('click', () => {
    const map = {UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
    const d = map[b.dataset.dir];
    if (d && !(d.x===-dir.x&&d.y===-dir.y)) nextDir = d;
  });
});
</script>
</body>
</html>
