<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --snake: #39ff14;
    --snake-head: #a0ff70;
    --food: #ff3c3c;
    --text: #39ff14;
    --dim: #1e3a1e;
    --btn: #1a2e1a;
    --btn-active: #2a4a2a;
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    user-select: none;
    touch-action: manipulation;
    padding: 1rem 0.5rem;
    gap: 0.6rem;
  }

  h1 {
    font-size: clamp(1.2rem, 5vw, 2rem);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px var(--snake), 0 0 40px var(--snake);
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  #scorebar {
    display: flex;
    gap: 1.5rem;
    font-size: 0.5rem;
    color: var(--text);
  }

  #canvas-wrap {
    position: relative;
  }

  canvas {
    display: block;
    border: 2px solid var(--dim);
    box-shadow: 0 0 30px #39ff1420, inset 0 0 30px #00000080;
    image-rendering: pixelated;
    /* Scale canvas to fit small screens */
    max-width: min(400px, 95vw);
    max-height: min(400px, 95vw);
    width: min(400px, 95vw);
    height: min(400px, 95vw);
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0fee;
    gap: 1rem;
  }

  #overlay h2 {
    font-size: clamp(0.7rem, 3vw, 1rem);
    letter-spacing: 0.2em;
    color: var(--food);
    text-shadow: 0 0 15px var(--food);
  }

  #overlay p {
    font-size: clamp(0.35rem, 2vw, 0.45rem);
    color: #aaa;
    line-height: 2;
    text-align: center;
  }

  #overlay button {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(0.4rem, 2vw, 0.55rem);
    padding: 0.6rem 1.2rem;
    background: transparent;
    border: 2px solid var(--snake);
    color: var(--snake);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-shadow: 0 0 10px var(--snake);
    box-shadow: 0 0 12px #39ff1440;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  #overlay button:hover, #overlay button:active {
    background: var(--snake);
    color: #000;
  }

  /* D-PAD */
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
    margin-top: 0.4rem;
  }

  .dpad-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.3rem;
    background: var(--btn);
    border: 2px solid var(--dim);
    color: var(--snake);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.08s, transform 0.08s;
    box-shadow: 0 0 8px #39ff1420;
    text-shadow: 0 0 8px var(--snake);
    /* Prevent text selection on rapid taps */
    user-select: none;
  }

  .dpad-btn:active {
    background: var(--btn-active);
    transform: scale(0.92);
    border-color: var(--snake);
  }

  .dpad-blank { visibility: hidden; }

  #kb-hint {
    font-size: 0.35rem;
    color: #333;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<h1>SNAKE</h1>

<div id="scorebar">
  <span>SCORE: <span id="score">0</span></span>
  <span>BEST: <span id="best">0</span></span>
  <span>LVL: <span id="level">1</span></span>
</div>

<div id="canvas-wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">USE ARROW KEYS, WASD,<br>OR THE D-PAD BELOW</p>
    <button id="btn">START GAME</button>
  </div>
</div>

<!-- D-Pad -->
<div id="dpad">
  <div class="dpad-blank"></div>
  <button class="dpad-btn" id="d-up">▲</button>
  <div class="dpad-blank"></div>

  <button class="dpad-btn" id="d-left">◀</button>
  <div class="dpad-blank"></div>
  <button class="dpad-btn" id="d-right">▶</button>

  <div class="dpad-blank"></div>
  <button class="dpad-btn" id="d-down">▼</button>
  <div class="dpad-blank"></div>
</div>

<p id="kb-hint">KEYBOARD: ARROW KEYS / WASD</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, score, best=0, level, speed, running, raf, last=0;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const oTitle  = document.getElementById('overlay-title');
const oMsg    = document.getElementById('overlay-msg');
const btn     = document.getElementById('btn');

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0; level = 1; speed = 10;
  placeFood();
  updateUI();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function tryDir(d) {
  // Ignore 180° reversal
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
}

function step() {
  dir = {...nextDir};
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return gameOver();
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();
  snake.unshift(head);
  if (head.x===food.x&&head.y===food.y) {
    score++;
    if (score % 5 === 0) { level++; speed = Math.min(22, speed+2); }
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
}

function updateUI() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  if (score > best) { best = score; bestEl.textContent = best; }
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#111118';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if((r+c)%2===0) ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }
  const pulse = 0.85 + 0.15*Math.sin(Date.now()/200);
  ctx.fillStyle = `rgba(255,60,60,${pulse})`;
  ctx.shadowColor = '#ff3c3c';
  ctx.shadowBlur = 12*pulse;
  ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);
  ctx.shadowBlur = 0;
  snake.forEach((seg,i) => {
    const isHead = i===0;
    ctx.fillStyle = isHead ? '#a0ff70' : '#39ff14';
    ctx.shadowColor = isHead ? '#a0ff70' : '#39ff14';
    ctx.shadowBlur = isHead ? 16 : 6;
    const pad = isHead ? 1 : 2;
    ctx.fillRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2);
  });
  ctx.shadowBlur = 0;
}

function loop(ts) {
  if (!running) return;
  raf = requestAnimationFrame(loop);
  const elapsed = ts - last;
  draw();
  if (elapsed > 1000/speed) {
    last = ts - (elapsed % (1000/speed));
    step();
  }
}

function startGame() {
  overlay.style.display = 'none';
  init();
  running = true;
  last = 0;
  raf = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  cancelAnimationFrame(raf);
  oTitle.textContent = 'GAME OVER';
  oMsg.innerHTML = `SCORE: ${score}<br>BEST: ${best}`;
  btn.textContent = 'PLAY AGAIN';
  overlay.style.display = 'flex';
}

btn.addEventListener('click', startGame);

// Keyboard
const keyMap = {
  ArrowUp:{x:0,y:-1}, w:{x:0,y:-1}, W:{x:0,y:-1},
  ArrowDown:{x:0,y:1}, s:{x:0,y:1}, S:{x:0,y:1},
  ArrowLeft:{x:-1,y:0}, a:{x:-1,y:0}, A:{x:-1,y:0},
  ArrowRight:{x:1,y:0}, d:{x:1,y:0}, D:{x:1,y:0},
};
document.addEventListener('keydown', e => {
  const d = keyMap[e.key];
  if (d) { tryDir(d); e.preventDefault(); }
});

// D-Pad buttons
const dpadMap = {
  'up':    {x:0,y:-1},
  'down':  {x:0,y:1},
  'left':  {x:-1,y:0},
  'right': {x:1,y:0},
};
['up','down','left','right'].forEach(name => {
  const el = document.getElementById('d-'+name);
  // touchstart for instant response on mobile
  el.addEventListener('touchstart', e => { e.preventDefault(); tryDir(dpadMap[name]); }, {passive:false});
  el.addEventListener('click', () => tryDir(dpadMap[name]));
});

// Swipe support on canvas
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) tryDir({x: dx>0?1:-1, y:0});
  else tryDir({x:0, y: dy>0?1:-1});
}, {passive:true});
</script>
</body>
</html>
