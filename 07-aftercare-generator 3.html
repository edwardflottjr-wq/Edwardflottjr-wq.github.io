<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INK OS — Aftercare Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#2a2a2a;--gold:#b8965a;--gold-dim:#7a6038;--red:#c0392b;--green:#27ae60;--text:#e0e0e0;--muted:#666;--font-d:'Cinzel',serif;--font-b:'IBM Plex Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
  nav{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
  nav a{color:var(--gold-dim);text-decoration:none;font-size:0.7rem;letter-spacing:0.2em;}
  nav a:hover{color:var(--gold);}
  .page-title{font-family:var(--font-d);font-size:1.2rem;letter-spacing:0.15em;margin:0 auto;}
  .layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 53px);}
  .inputs{padding:2rem;border-right:1px solid var(--border);overflow-y:auto;}
  .output{padding:2rem;overflow-y:auto;}
  .section{margin-bottom:1.75rem;}
  .section-title{font-family:var(--font-d);font-size:0.8rem;letter-spacing:0.25em;color:var(--gold);margin-bottom:1rem;text-transform:uppercase;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
  .form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.85rem;}
  label{font-size:0.63rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
  input,select,textarea{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:0.78rem;padding:0.6rem 0.75rem;border-radius:2px;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-dim);}
  select option{background:var(--card);}
  .toggle-row{display:flex;gap:0;}
  .toggle-btn{flex:1;padding:0.55rem;background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:var(--font-b);font-size:0.7rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
  .toggle-btn:first-child{border-radius:2px 0 0 2px;}
  .toggle-btn:last-child{border-radius:0 2px 2px 0;border-left:none;}
  .toggle-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
  .btn{background:var(--gold);color:#000;border:none;font-family:var(--font-b);font-size:0.7rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:0.6rem 1rem;cursor:pointer;border-radius:2px;transition:background 0.2s;width:100%;}
  .btn:hover{background:#d4a96a;}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);}
  .btn-outline:hover{background:var(--gold-dim);color:#000;}
  /* Output styles */
  .output-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .output-title{font-family:var(--font-d);font-size:1.3rem;letter-spacing:0.2em;color:var(--gold);}
  .output-subtitle{font-size:0.7rem;color:var(--muted);margin-top:0.4rem;}
  .day-cards{display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem;}
  .day-card{background:var(--card);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .day-card-header{padding:0.75rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem;}
  .day-num{font-family:var(--font-d);font-size:1rem;color:var(--gold);min-width:60px;}
  .day-label{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
  .day-card-body{padding:1rem;}
  .instruction-list{display:flex;flex-direction:column;gap:0.5rem;}
  .instruction{display:flex;gap:0.75rem;font-size:0.75rem;line-height:1.6;}
  .inst-bullet{color:var(--gold);flex-shrink:0;margin-top:0.1rem;}
  .warning-box{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);padding:1rem;border-radius:2px;margin-bottom:1.5rem;}
  .warning-title{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);margin-bottom:0.5rem;}
  .warning-items{display:flex;flex-direction:column;gap:0.3rem;font-size:0.73rem;color:var(--muted);}
  .contact-box{background:rgba(184,150,90,0.08);border:1px solid var(--gold-dim);padding:1rem;border-radius:2px;margin-bottom:1.5rem;font-size:0.75rem;}
  .btn-row{display:flex;gap:0.75rem;}
  .btn-row .btn{width:auto;flex:1;}
  .empty-output{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--muted);}
  @media(max-width:700px){.layout{grid-template-columns:1fr;}.inputs{border-right:none;border-bottom:1px solid var(--border);}.btn-row{flex-direction:column;}}
</style>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Aftercare">
  <script>
  (function(){
    var c=document.createElement('canvas');
    c.width=c.height=512;
    var ctx=c.getContext('2d');
    if(!ctx)return;
    
ctx.fillStyle='#0a0a0a';
ctx.fillRect(0,0,512,512);
// Shield
ctx.fillStyle='#1a1a1a';
ctx.strokeStyle='#b8965a';
ctx.lineWidth=14;
ctx.beginPath();
ctx.moveTo(256,60);
ctx.lineTo(420,130);
ctx.lineTo(420,280);
ctx.bezierCurveTo(420,390,256,460,256,460);
ctx.bezierCurveTo(256,460,92,390,92,280);
ctx.lineTo(92,130);
ctx.closePath();
ctx.fill();ctx.stroke();
// Inner shield
ctx.strokeStyle='#7a6038';
ctx.lineWidth=5;
ctx.beginPath();
ctx.moveTo(256,100);ctx.lineTo(385,158);ctx.lineTo(385,278);
ctx.bezierCurveTo(385,368,256,428,256,428);
ctx.bezierCurveTo(256,428,127,368,127,278);
ctx.lineTo(127,158);ctx.closePath();
ctx.stroke();
// Cross
ctx.fillStyle='#e0e0e0';
ctx.fillRect(225,175,62,180);
ctx.fillRect(166,235,180,62);
// Gold heart overlay
ctx.fillStyle='#b8965a';
ctx.font='72px serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText('♥',256,420);

    var link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.href=c.toDataURL('image/png');
    document.head.appendChild(link);
  })();
  </script>
</head>
<body>
<nav>
  <a href="index.html">← INK OS</a>
  <span class="page-title">Aftercare Generator</span>
</nav>
<div class="layout">
  <div class="inputs">
    <div class="section">
      <div class="section-title">Client</div>
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="clientName" placeholder="Optional">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Tattoo Details</div>
      <div class="form-group">
        <label>Placement</label>
        <select id="placement">
          <option value="general">General / Other</option>
          <option value="arm">Arm / Forearm</option>
          <option value="hand">Hand / Finger</option>
          <option value="foot">Foot / Ankle</option>
          <option value="neck">Neck / Behind ear</option>
          <option value="rib">Ribs / Side</option>
          <option value="joint">Joint (elbow, knee, wrist)</option>
          <option value="torso">Torso / Back</option>
          <option value="face">Face / Head</option>
        </select>
      </div>
      <div class="form-group">
        <label>Wrap Used</label>
        <div class="toggle-row">
          <button class="toggle-btn active" id="wrap-saniderm" onclick="setWrap('saniderm')">Saniderm</button>
          <button class="toggle-btn" id="wrap-plastic" onclick="setWrap('plastic')">Plastic</button>
          <button class="toggle-btn" id="wrap-none" onclick="setWrap('none')">None</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Skin Sensitivity</div>
      <div class="form-group">
        <label>Sensitivity Level</label>
        <div class="toggle-row">
          <button class="toggle-btn active" id="sens-normal" onclick="setSens('normal')">Normal</button>
          <button class="toggle-btn" id="sens-sensitive" onclick="setSens('sensitive')">Sensitive</button>
        </div>
      </div>
      <div class="form-group">
        <label>Known Skin Conditions</label>
        <input type="text" id="skinCond" placeholder="eczema, psoriasis, etc.">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Artist Contact (optional)</div>
      <div class="form-group"><label>Artist Name</label><input type="text" id="artistName" placeholder="Your name"></div>
      <div class="form-group"><label>Phone / Instagram</label><input type="text" id="artistContact" placeholder="@handle or phone"></div>
    </div>

    <button class="btn" onclick="generate()">Generate Aftercare Sheet</button>
  </div>

  <div class="output" id="output">
    <div class="empty-output">
      <div style="font-size:3rem;opacity:0.3">🩹</div>
      <div style="font-size:0.75rem;letter-spacing:0.2em">FILL IN DETAILS AND GENERATE</div>
    </div>
  </div>
</div>

<script>
let wrap = 'saniderm';
let sensitivity = 'normal';

function setWrap(w) {
  wrap = w;
  ['saniderm','plastic','none'].forEach(x=>document.getElementById('wrap-'+x).classList.toggle('active',x===w));
}
function setSens(s) {
  sensitivity = s;
  ['normal','sensitive'].forEach(x=>document.getElementById('sens-'+x).classList.toggle('active',x===s));
}

function generate() {
  const client = document.getElementById('clientName').value.trim();
  const placement = document.getElementById('placement').value;
  const skinCond = document.getElementById('skinCond').value.trim();
  const artistName = document.getElementById('artistName').value.trim();
  const artistContact = document.getElementById('artistContact').value.trim();

  const placementNotes = {
    hand: 'Hand and finger tattoos are in a high-movement, high-friction zone. They typically require at least one touch-up. Moisturize frequently.',
    foot: 'Feet and ankles experience constant friction from footwear. Wear loose, clean socks. Avoid tight shoes for 2 weeks.',
    joint: 'Joint placements (elbow, knee, wrist) flex constantly. This can slow healing and cause cracking. Minimize bending when possible.',
    neck: 'The neck and behind-ear areas move frequently. Keep hair off the area. Be especially gentle washing.',
    face: 'Face tattoos heal in a high-exposure environment. Avoid makeup on the area for at least 2 weeks. Strict sun protection required.',
    rib: 'Ribs and sides are frequently in contact with clothing. Wear loose, clean clothing. The breathing movement can slow healing.',
    general: '', arm: '', torso: ''
  };

  // Build day-by-day content based on wrap type
  let days = [];
  if (wrap === 'saniderm') {
    days = [
      {range:'Hours 0–24',label:'First wrap still on',items:[
        'Leave the Saniderm bandage on for the first 24 hours.',
        'Some fluid accumulation under the bandage (plasma, ink, blood) is completely normal.',
        'If the bandage peels up or leaks, it\'s okay to remove it and follow the "no wrap" instructions below.',
        'Avoid getting the bandage excessively wet (no submerging).',
        sensitivity==='sensitive'?'If you notice a rash or blistering around the bandage edges, remove it immediately.':null
      ].filter(Boolean)},
      {range:'Day 2–4',label:'Saniderm removal window',items:[
        'Remove the Saniderm in the shower under warm water — pull slowly at a low angle, pulling skin taut.',
        'Wash gently with unscented antibacterial soap using clean fingertips only. No washcloths.',
        'Pat dry with clean paper towels. Do NOT rub.',
        'Apply a thin layer of unscented lotion (Lubriderm, Aveeno, CeraVe Healing Ointment). Less is more.',
        'Let it air out for several hours if possible.',
        sensitivity==='sensitive'?'Use fragrance-free, dye-free products only. Avoid anything with alcohol.':null
      ].filter(Boolean)},
      {range:'Days 5–14',label:'Active healing phase',items:[
        'Wash gently 2× per day with unscented soap.',
        'Moisturize with a thin layer of unscented lotion 2–3× per day.',
        'Some peeling and flaking is normal — do NOT pick or scratch.',
        'The tattoo may appear dull or cloudy — this is the outer layers shedding. The color will re-emerge.',
        'Wear loose, breathable clothing over the area.',
        'Avoid prolonged sun exposure. Cover when outdoors.',
        'No swimming, soaking, or baths for 2 weeks.'
      ]},
      {range:'Weeks 3–4',label:'Surface healed',items:[
        'Surface skin will appear healed, but the deeper layers are still settling.',
        'Continue using SPF 30+ sunscreen on the tattoo when outdoors.',
        'Full dermal healing takes 3–4 months. Avoid tanning beds during this period.',
        'If you notice any unusual redness, swelling, or discharge after week 1, contact your artist or a physician.'
      ]}
    ];
  } else if (wrap === 'plastic') {
    days = [
      {range:'First 2–4 hours',label:'Plastic wrap on',items:[
        'Keep the plastic wrap on for 2–4 hours (your artist will specify).',
        'Do NOT re-wrap with plastic overnight — it traps moisture and bacteria.',
        'Remove the wrap in a clean environment.',
        sensitivity==='sensitive'?'If you notice increased irritation, remove the wrap earlier.':null
      ].filter(Boolean)},
      {range:'Day 1 (after removal)',label:'First wash',items:[
        'Remove the wrap and wash gently with unscented antibacterial soap.',
        'Pat dry with clean paper towels.',
        'Apply a very thin layer of fragrance-free ointment (Aquaphor or plain unscented lotion). Thin is critical — too much suffocates the skin.',
        'Repeat 3× per day for the first week.',
        'Keep it uncovered and allow air circulation.'
      ]},
      {range:'Days 2–14',label:'Healing phase',items:[
        'Wash 2× per day with unscented soap. Pat dry.',
        'Apply thin, unscented moisturizer 2–3× per day.',
        'Some peeling, flaking, and itching is normal. Do NOT pick or scratch.',
        'Wear loose, breathable clothing.',
        'No sun exposure on the tattoo. No swimming or soaking.',
        sensitivity==='sensitive'?'If unusual redness or raised bumps appear, discontinue your current lotion and try plain CeraVe Healing Ointment.':null
      ].filter(Boolean)},
      {range:'Weeks 3–4+',label:'Settling phase',items:[
        'Continue sunscreen (SPF 30+) when outdoors.',
        'Surface is healed but deeper layers continue settling for 3–4 months.',
        'Touch-up eligibility: minimum 8 weeks after the session.'
      ]}
    ];
  } else { // no wrap
    days = [
      {range:'Immediately after',label:'Right away',items:[
        'Wash the tattoo immediately and gently when you get home.',
        'Use unscented antibacterial soap (Dial Gold, Neutrogena) with clean fingertips only.',
        'Pat dry with clean paper towels.',
        'Apply a thin layer of Aquaphor or unscented ointment.',
        'Do NOT wrap it. Allow air circulation.'
      ]},
      {range:'Days 1–3',label:'First days',items:[
        'Wash gently 3× per day.',
        'Apply thin ointment (Aquaphor) after each wash.',
        'Keep area clean and uncovered when possible.',
        sensitivity==='sensitive'?'Monitor closely for unusual swelling or hives. Contact artist or doctor if they appear.':null
      ].filter(Boolean)},
      {range:'Days 4–14',label:'Transition to lotion',items:[
        'Switch from ointment to a fragrance-free lotion (Lubriderm, CeraVe, Aveeno unscented).',
        'Wash 2× per day, moisturize 2–3× per day.',
        'Peeling and flaking is normal. Do NOT pick — you will pull ink.',
        'Avoid sun, swimming, soaking, saunas.',
        'Wear loose, breathable clothing over the area.'
      ]},
      {range:'Weeks 3–4+',label:'Final phase',items:[
        'Continue SPF 30+ sun protection.',
        'Avoid tanning beds for 3–4 months.',
        'Touch-up eligibility: minimum 8 weeks.'
      ]}
    ];
  }

  const placementNote = placementNotes[placement] || '';
  const clientDisplay = client || 'your client';

  document.getElementById('output').innerHTML = `
    <div class="output-header">
      <div class="output-title">AFTERCARE INSTRUCTIONS</div>
      <div class="output-subtitle">${client?'Client: '+client+' · ':''} ${new Date().toLocaleDateString()} · Wrap: ${wrap.charAt(0).toUpperCase()+wrap.slice(1)} · ${sensitivity.charAt(0).toUpperCase()+sensitivity.slice(1)} skin</div>
    </div>

    ${placementNote?`<div class="warning-box" style="border-color:rgba(184,150,90,0.3);background:rgba(184,150,90,0.06)"><div class="warning-title" style="color:var(--gold)">Placement Note</div><div class="warning-items"><div>${placementNote}</div></div></div>`:''}

    ${skinCond?`<div class="warning-box"><div class="warning-title">Skin Condition: ${skinCond}</div><div class="warning-items"><div>Use only fragrance-free, hypoallergenic products. Avoid any product that previously caused a reaction.</div></div></div>`:''}

    <div class="day-cards">
      ${days.map(d=>`<div class="day-card">
        <div class="day-card-header">
          <span class="day-num">${d.range}</span>
          <span class="day-label">${d.label}</span>
        </div>
        <div class="day-card-body">
          <div class="instruction-list">
            ${d.items.map(i=>`<div class="instruction"><span class="inst-bullet">▸</span><span>${i}</span></div>`).join('')}
          </div>
        </div>
      </div>`).join('')}
    </div>

    <div class="warning-box">
      <div class="warning-title">⚠ Seek medical attention if you notice:</div>
      <div class="warning-items">
        <div>▸ Increasing redness, swelling, or warmth after day 3</div>
        <div>▸ Pus or unusual discharge (not clear plasma)</div>
        <div>▸ Red streaks extending from the tattoo</div>
        <div>▸ Fever in combination with any of the above</div>
        <div>▸ Severe allergic reaction: hives, difficulty breathing</div>
      </div>
    </div>

    <div class="warning-box" style="background:rgba(0,0,0,0.2);border-color:var(--border)">
      <div class="warning-title" style="color:var(--muted)">⛔ Avoid for 2–4 weeks:</div>
      <div class="warning-items">
        <div>▸ Direct sun exposure on the tattoo</div>
        <div>▸ Swimming (pools, ocean, lakes)</div>
        <div>▸ Soaking (baths, hot tubs)</div>
        <div>▸ Picking, peeling, or scratching</div>
        <div>▸ Tight clothing or friction over the area</div>
        <div>▸ Petroleum jelly (Vaseline) — it clogs pores</div>
        <div>▸ Scented lotions, sunscreens, or soaps</div>
      </div>
    </div>

    ${artistName||artistContact?`<div class="contact-box">
      <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem">Questions? Contact your artist</div>
      ${artistName?`<div>${artistName}</div>`:''}
      ${artistContact?`<div style="color:var(--gold)">${artistContact}</div>`:''}
    </div>`:''}

    <div class="btn-row">
      <button class="btn" onclick="printSheet()">Print Sheet</button>
      <button class="btn btn-outline" onclick="copyText()">Copy as Text</button>
    </div>
  `;
}

function printSheet() {
  const content = document.getElementById('output').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Aftercare Instructions</title><style>
    body{font-family:Georgia,serif;max-width:700px;margin:40px auto;color:#111;font-size:13px;line-height:1.7;}
    h1{font-size:22px;letter-spacing:3px;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:6px;}
    .output-subtitle{font-size:11px;color:#888;margin-bottom:24px;}
    .day-card{margin-bottom:16px;border:1px solid #ccc;border-radius:2px;}
    .day-card-header{display:flex;gap:12px;background:#f5f5f5;padding:8px 12px;border-bottom:1px solid #ccc;}
    .day-num{font-weight:bold;font-size:13px;}
    .day-label{color:#666;font-size:11px;}
    .day-card-body{padding:10px 12px;}
    .instruction{display:flex;gap:8px;margin-bottom:4px;font-size:12px;}
    .inst-bullet{color:#999;}
    .warning-box{margin-bottom:16px;padding:10px 12px;border:1px solid #ccc;background:#fafafa;}
    .warning-title{font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .warning-items div{font-size:12px;margin-bottom:2px;}
    .contact-box{padding:10px;border:1px solid #ccc;margin-bottom:16px;}
    @media print{body{margin:15px;}}
  </style></head><body>${content.replace(/<div class="btn-row">[\s\S]*?<\/div>/,'')}</body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

function copyText() {
  const days = document.querySelectorAll('#output .day-card');
  let text = 'TATTOO AFTERCARE INSTRUCTIONS\n================================\n\n';
  days.forEach(card=>{
    const range = card.querySelector('.day-num')?.textContent||'';
    const label = card.querySelector('.day-label')?.textContent||'';
    text += range.toUpperCase()+' — '+label.toUpperCase()+'\n';
    card.querySelectorAll('.instruction span:last-child').forEach(i=>{ text += '  • '+i.textContent+'\n'; });
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelectorAll('#output .btn')[1];
    if (btn) { btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy as Text',1500); }
  });
}
</script>
</body>
</html>
